<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 933" role="img" aria-labelledby="title desc">
  <title id="title">Regression to the mean</title>
  <desc id="desc">A chart showing extreme measurements moving back toward an average line.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fbfaf6"/>
      <stop offset="1" stop-color="#edf5f2"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="20" flood-color="#16211f" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="1400" height="933" fill="url(#bg)"/>
  <rect x="160" y="126" width="1080" height="680" rx="18" fill="#fff" filter="url(#shadow)"/>
  <text x="220" y="204" fill="#2f665b" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">REGRESSION TO THE MEAN</text>
  <line x1="260" y1="650" x2="1140" y2="650" stroke="#16211f" stroke-width="5" stroke-linecap="round"/>
  <line x1="260" y1="650" x2="260" y2="252" stroke="#16211f" stroke-width="5" stroke-linecap="round"/>
  <line x1="300" y1="456" x2="1110" y2="456" stroke="#1f7a8c" stroke-width="8" stroke-linecap="round" stroke-dasharray="18 18"/>
  <text x="918" y="426" fill="#1f7a8c" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">average line</text>

  <path d="M392 292 C 486 340, 574 392, 672 438" fill="none" stroke="#c75c4a" stroke-width="16" stroke-linecap="round"/>
  <path d="M392 292 C 486 340, 574 392, 672 438" fill="none" stroke="#f2c1b8" stroke-width="6" stroke-linecap="round"/>
  <path d="M948 610 C 1008 570, 1058 540, 1110 512" fill="none" stroke="#c59838" stroke-width="16" stroke-linecap="round"/>
  <path d="M948 610 C 1008 570, 1058 540, 1110 512" fill="none" stroke="#f0d9a5" stroke-width="6" stroke-linecap="round"/>

  <circle cx="392" cy="292" r="28" fill="#c75c4a"/>
  <circle cx="530" cy="368" r="24" fill="#c59838"/>
  <circle cx="672" cy="438" r="24" fill="#1f7a8c"/>
  <circle cx="812" cy="476" r="24" fill="#1f7a8c"/>
  <circle cx="948" cy="610" r="28" fill="#c75c4a"/>
  <circle cx="1110" cy="512" r="24" fill="#c59838"/>

  <rect x="314" y="218" width="166" height="52" rx="12" fill="#f8eeee" stroke="#c75c4a" stroke-width="4"/>
  <text x="397" y="253" text-anchor="middle" fill="#16211f" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">extreme high</text>
  <rect x="864" y="632" width="166" height="52" rx="12" fill="#f8eeee" stroke="#c75c4a" stroke-width="4"/>
  <text x="947" y="667" text-anchor="middle" fill="#16211f" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">extreme low</text>
  <text x="260" y="724" fill="#5c6b66" font-family="Inter, Arial, sans-serif" font-size="32">unusual measurements tend to move back toward normal</text>
</svg>
