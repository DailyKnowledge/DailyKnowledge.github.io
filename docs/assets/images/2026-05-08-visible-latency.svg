<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 933" role="img" aria-labelledby="title desc">
  <title id="title">Visible Latency</title>
  <desc id="desc">A diagram comparing invisible latency (uncertainty) with visible latency (progress/feedback).</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#f4f2ec"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="20" flood-color="#17212b" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect width="1400" height="933" fill="url(#bg)"/>
  <rect x="160" y="126" width="1080" height="680" rx="18" fill="#ffffff" filter="url(#shadow)"/>
  
  <text x="220" y="204" fill="#2e6678" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">VISIBLE LATENCY</text>

  <!-- Left: Invisible Latency (Frustration) -->
  <g transform="translate(250, 300)">
    <rect width="400" height="300" rx="12" fill="#fff3ef" stroke="#dfb6ad" stroke-width="2"/>
    <text x="200" y="40" text-anchor="middle" fill="#b94f43" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">INVISIBLE LATENCY</text>
    
    <rect x="50" y="80" width="300" height="40" rx="6" fill="#d1d9de"/>
    <circle cx="200" cy="180" r="40" fill="none" stroke="#d1d9de" stroke-width="8"/>
    <text x="200" y="250" text-anchor="middle" fill="#68747c" font-family="Inter, Arial, sans-serif" font-size="18">"Did it work?"</text>
    <text x="200" y="280" text-anchor="middle" fill="#b94f43" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">UNCERTAINTY</text>
  </g>

  <!-- Right: Visible Latency (Trust) -->
  <g transform="translate(750, 300)">
    <rect width="400" height="300" rx="12" fill="#eef7f8" stroke="#1f7a8c" stroke-width="2"/>
    <text x="200" y="40" text-anchor="middle" fill="#1f7a8c" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">VISIBLE LATENCY</text>
    
    <rect x="50" y="80" width="300" height="40" rx="6" fill="#1f7a8c" opacity="0.2"/>
    <rect x="50" y="80" width="180" height="40" rx="6" fill="#1f7a8c"/> <!-- Progress Bar -->
    
    <!-- Loading spinner / feedback icon -->
    <path d="M 200 140 A 40 40 0 1 1 199 140" fill="none" stroke="#1f7a8c" stroke-width="8" stroke-dasharray="20,10" stroke-linecap="round"/>
    
    <text x="200" y="250" text-anchor="middle" fill="#68747c" font-family="Inter, Arial, sans-serif" font-size="18">"Processing..."</text>
    <text x="200" y="280" text-anchor="middle" fill="#1f7a8c" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">FEEDBACK</text>
  </g>

  <text x="700" y="790" text-anchor="middle" fill="#5d6870" font-family="Inter, Arial, sans-serif" font-size="32">A loading state is part of the product.</text>
</svg>
