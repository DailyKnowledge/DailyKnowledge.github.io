<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 933" role="img" aria-labelledby="title desc">
  <title id="title">Bayes' Rule</title>
  <desc id="desc">A diagram showing the Bayesian process of updating a prior belief with new evidence to reach a posterior belief.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#f4f2ec"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="20" flood-color="#17212b" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow-teal" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#1f7a8c"/>
    </marker>
  </defs>
  <rect width="1400" height="933" fill="url(#bg)"/>
  <rect x="160" y="126" width="1080" height="680" rx="18" fill="#ffffff" filter="url(#shadow)"/>
  
  <text x="220" y="204" fill="#2e6678" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">BAYES' RULE</text>

  <!-- Prior -->
  <rect x="250" y="350" width="220" height="180" rx="12" fill="#f1f4ed" stroke="#dfe4dc" stroke-width="2"/>
  <text x="360" y="330" text-anchor="middle" fill="#5c6b66" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">PRIOR</text>
  <circle cx="360" cy="440" r="50" fill="#c59838" opacity="0.6"/>
  <text x="360" y="560" text-anchor="middle" fill="#68747c" font-family="Inter, Arial, sans-serif" font-size="16">Initial Belief</text>

  <text x="525" y="450" text-anchor="middle" fill="#2e6678" font-family="Inter, Arial, sans-serif" font-size="40" font-weight="700">+</text>

  <!-- Evidence -->
  <rect x="590" y="350" width="220" height="180" rx="12" fill="#eef7f8" stroke="#aacbd2" stroke-width="2"/>
  <text x="700" y="330" text-anchor="middle" fill="#1f7a8c" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">EVIDENCE</text>
  <path d="M 670 410 L 730 470 M 730 410 L 670 470" stroke="#1f7a8c" stroke-width="8" stroke-linecap="round"/>
  <text x="700" y="560" text-anchor="middle" fill="#68747c" font-family="Inter, Arial, sans-serif" font-size="16">New Data</text>

  <path d="M 830 440 L 880 440" stroke="#1f7a8c" stroke-width="4" marker-end="url(#arrow-teal)"/>

  <!-- Posterior -->
  <rect x="930" y="350" width="220" height="180" rx="12" fill="#1f7a8c" opacity="0.1"/>
  <rect x="930" y="350" width="220" height="180" rx="12" fill="none" stroke="#1f7a8c" stroke-width="4"/>
  <text x="1040" y="330" text-anchor="middle" fill="#1f7a8c" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">POSTERIOR</text>
  <circle cx="1040" cy="440" r="65" fill="#1f7a8c" opacity="0.8"/>
  <text x="1040" y="560" text-anchor="middle" fill="#68747c" font-family="Inter, Arial, sans-serif" font-size="16">Updated Belief</text>

  <text x="700" y="790" text-anchor="middle" fill="#5d6870" font-family="Inter, Arial, sans-serif" font-size="32">Update your confidence as new facts emerge.</text>
</svg>
