<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 933" role="img" aria-labelledby="title desc">
  <title id="title">The Streisand Effect</title>
  <desc id="desc">A diagram illustrating the Streisand Effect: attempting to suppress a document with a censored stamp only results in massive, global attention and skyrocketing views.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#f4f2ec"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="20" flood-color="#17212b" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#c95b4d" />
    </marker>
    <marker id="arrow-teal" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1f7a8c" />
    </marker>
  </defs>
  <rect width="1400" height="933" fill="url(#bg)"/>
  <rect x="160" y="126" width="1080" height="680" rx="18" fill="#ffffff" filter="url(#shadow)"/>
  
  <text x="220" y="204" fill="#2e6678" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">THE STREISAND EFFECT</text>

  <!-- Left Column: Suppressed Info -->
  <g>
    <text x="400" y="280" text-anchor="middle" fill="#68747c" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">Intended Suppression</text>
    
    <!-- Document -->
    <rect x="310" y="320" width="180" height="220" rx="8" fill="#f8f9fa" stroke="#c95b4d" stroke-width="3"/>
    <!-- Simple horizontal lines on document -->
    <line x1="340" y1="360" x2="460" y2="360" stroke="#d5d8dc" stroke-width="4" stroke-linecap="round"/>
    <line x1="340" y1="390" x2="460" y2="390" stroke="#d5d8dc" stroke-width="4" stroke-linecap="round"/>
    <line x1="340" y1="420" x2="420" y2="420" stroke="#d5d8dc" stroke-width="4" stroke-linecap="round"/>
    <line x1="340" y1="450" x2="450" y2="450" stroke="#d5d8dc" stroke-width="4" stroke-linecap="round"/>

    <!-- Censored Stamp (Diagonal) -->
    <g transform="translate(400, 420) rotate(-15) translate(-400, -420)">
      <rect x="290" y="400" width="220" height="46" rx="4" fill="#c95b4d" opacity="0.95"/>
      <text x="400" y="430" text-anchor="middle" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="900" letter-spacing="2">CENSORED</text>
    </g>

    <text x="400" y="590" text-anchor="middle" fill="#68747c" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Views: Low / Undetected</text>
  </g>

  <!-- Censorship Attempt Arrow -->
  <g>
    <path d="M 590 420 L 710 420" fill="none" stroke="#c59838" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow-red)"/>
    <text x="650" y="390" text-anchor="middle" fill="#c59838" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">CENSORSHIP</text>
    <text x="650" y="450" text-anchor="middle" fill="#c59838" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">ATTEMPT</text>
  </g>

  <!-- Right Column: Unintended Attention -->
  <g>
    <text x="1000" y="280" text-anchor="middle" fill="#1f7a8c" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">Actual Amplification</text>
    
    <!-- Document (Highlighted / Bright) -->
    <rect x="910" y="320" width="180" height="220" rx="8" fill="#ffffff" stroke="#1f7a8c" stroke-width="4" filter="drop-shadow(0 0 12px rgba(31,122,140,0.3))"/>
    <line x1="940" y1="360" x2="1060" y2="360" stroke="#b2ebf2" stroke-width="4" stroke-linecap="round"/>
    <line x1="940" y1="390" x2="1060" y2="390" stroke="#b2ebf2" stroke-width="4" stroke-linecap="round"/>
    <line x1="940" y1="420" x2="1020" y2="420" stroke="#b2ebf2" stroke-width="4" stroke-linecap="round"/>
    <line x1="940" y1="450" x2="1050" y2="450" stroke="#b2ebf2" stroke-width="4" stroke-linecap="round"/>

    <!-- Attention Arrows Inward -->
    <path d="M 830 300 L 890 335" fill="none" stroke="#1f7a8c" stroke-width="3" marker-end="url(#arrow-teal)"/>
    <path d="M 1170 300 L 1110 335" fill="none" stroke="#1f7a8c" stroke-width="3" marker-end="url(#arrow-teal)"/>
    <path d="M 830 560 L 890 525" fill="none" stroke="#1f7a8c" stroke-width="3" marker-end="url(#arrow-teal)"/>
    <path d="M 1170 560 L 1110 525" fill="none" stroke="#1f7a8c" stroke-width="3" marker-end="url(#arrow-teal)"/>
    
    <path d="M 1000 240 L 1000 295" fill="none" stroke="#1f7a8c" stroke-width="3" marker-end="url(#arrow-teal)"/>
    
    <!-- Megaphone Icon at Left -->
    <g transform="translate(800, 400)">
      <path d="M 10 10 L 25 10 L 35 0 L 35 30 L 25 20 L 10 20 Z" fill="#1f7a8c" stroke="#1f7a8c" stroke-width="2"/>
      <path d="M 38 7 A 10 10 0 0 1 38 23" fill="none" stroke="#1f7a8c" stroke-width="2" stroke-linecap="round"/>
      <path d="M 43 2 A 18 18 0 0 1 43 28" fill="none" stroke="#1f7a8c" stroke-width="2" stroke-linecap="round"/>
    </g>

    <!-- Magnifying Glass at Right -->
    <g transform="translate(1140, 400)">
      <circle cx="15" cy="15" r="10" fill="none" stroke="#1f7a8c" stroke-width="3"/>
      <line x1="22" y1="22" x2="35" y2="35" stroke="#1f7a8c" stroke-width="4" stroke-linecap="round"/>
    </g>

    <text x="1000" y="590" text-anchor="middle" fill="#1f7a8c" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="900">Views: Skyrocketed (Viral)</text>
  </g>

  <!-- Bottom Message -->
  <text x="700" y="790" text-anchor="middle" fill="#5d6870" font-family="Inter, Arial, sans-serif" font-size="32">Attempts to hide information draw the spotlight directly to it.</text>
</svg>
