<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 933" role="img" aria-labelledby="title desc">
  <title id="title">Black Swan Theory</title>
  <desc id="desc">A probability distribution graph showing Mediocristan (normal distribution with thin tails) versus Extremistan (fat-tail distribution where rare, high-impact Black Swan events occur).</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#f4f2ec"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="20" flood-color="#17212b" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect width="1400" height="933" fill="url(#bg)"/>
  <rect x="160" y="126" width="1080" height="680" rx="18" fill="#ffffff" filter="url(#shadow)"/>
  
  <text x="220" y="204" fill="#2e6678" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">BLACK SWAN THEORY</text>

  <!-- Chart Area -->
  <g>
    <!-- Axis lines -->
    <path d="M 300 220 L 300 580 L 1100 580" fill="none" stroke="#68747c" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Y-axis Label -->
    <text x="-400" y="240" transform="rotate(-90)" text-anchor="middle" fill="#68747c" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Probability</text>
    <!-- X-axis Label -->
    <text x="700" y="630" text-anchor="middle" fill="#68747c" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Impact / Value of Event</text>

    <!-- Normal Distribution (Mediocristan) - Thin dashed line -->
    <path d="M 300 580 C 420 580 480 260 550 260 C 620 260 680 580 800 580" fill="none" stroke="#b0bec5" stroke-dasharray="6,4" stroke-width="2.5"/>
    <text x="550" y="225" text-anchor="middle" fill="#68747c" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">Thin-Tail (Mediocristan)</text>

    <!-- Fat-Tail Distribution (Extremistan) - Solid Teal line -->
    <path d="M 300 580 C 420 580 480 320 550 320 C 620 320 680 480 800 500 C 920 520 1000 525 1100 530" fill="none" stroke="#1f7a8c" stroke-width="4" stroke-linecap="round"/>
    <text x="550" y="365" text-anchor="middle" fill="#1f7a8c" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">Fat-Tail (Extremistan)</text>

    <!-- Black Swan Event Highlight in the Fat Tail -->
    <circle cx="1020" cy="527" r="12" fill="#333333" stroke="#c95b4d" stroke-width="3" filter="drop-shadow(0 0 8px rgba(201,91,77,0.6))"/>
    
    <!-- Leader Line to label -->
    <path d="M 1020 515 L 1020 440" fill="none" stroke="#c95b4d" stroke-width="1.5" stroke-dasharray="3,2"/>
    
    <!-- Event Labels -->
    <rect x="910" y="375" width="220" height="55" rx="6" fill="#fbebe8" stroke="#c95b4d" stroke-width="1.5"/>
    <text x="1020" y="398" text-anchor="middle" fill="#c95b4d" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="900">BLACK SWAN EVENT</text>
    <text x="1020" y="418" text-anchor="middle" fill="#68747c" font-family="Inter, Arial, sans-serif" font-size="11">Unpredictable, High Impact</text>
    
    <!-- Legend -->
    <g transform="translate(850, 180)">
      <rect x="0" y="0" width="220" height="80" rx="6" fill="#f8f9fa" stroke="#cfd8dc" stroke-width="1.5"/>
      
      <line x1="20" y1="25" x2="50" y2="25" stroke="#b0bec5" stroke-width="2.5" stroke-dasharray="4,3"/>
      <text x="60" y="30" fill="#68747c" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700">Mediocristan (Normal)</text>

      <line x1="20" y1="55" x2="50" y2="55" stroke="#1f7a8c" stroke-width="3.5"/>
      <text x="60" y="60" fill="#1f7a8c" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700">Extremistan (Fat-Tail)</text>
    </g>
  </g>

  <!-- Bottom Message -->
  <text x="700" y="790" text-anchor="middle" fill="#5d6870" font-family="Inter, Arial, sans-serif" font-size="32">"Prepare for the unexpected; build robustness, not predictions."</text>
</svg>
