<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 933" role="img" aria-labelledby="title desc">
  <title id="title">The Peter Principle</title>
  <desc id="desc">A diagram illustrating The Peter Principle.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#f4f2ec"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="20" flood-color="#17212b" flood-opacity="0.14"/>
    </filter>
    
    
    
    
  
  </defs>
  <rect width="1400" height="933" fill="url(#bg)"/>
  <rect x="160" y="126" width="1080" height="680" rx="18" fill="#ffffff" filter="url(#shadow)"/>
  
  <text x="220" y="204" fill="#2e6678" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">THE PETER PRINCIPLE</text>

  <g transform="translate(160.0, 196.0) scale(1.35)">
    <g transform="translate(400, 220)">
    <!-- Staircase centered -->
    <path d="M -200 80 L -100 80 L -100 30 L 0 30 L 0 -20 L 100 -20 L 100 -70 L 200 -70" fill="none" stroke="#d1d9de" stroke-width="4" />
    
    <!-- Competent Levels -->
    <rect x="-195" y="85" width="90" height="10" fill="#1f7a8c" />
    <rect x="-95" y="35" width="90" height="10" fill="#1f7a8c" />
    <rect x="5" y="-15" width="90" height="10" fill="#1f7a8c" />
    
    <!-- Level of Incompetence -->
    <rect x="105" y="-65" width="90" height="10" fill="#c95b4d" />
    <text x="150" y="-85" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#c95b4d">Incompetence</text>
    
    <text x="-150" y="110" font-family="Inter, Arial, sans-serif" font-size="16" text-anchor="middle" fill="#68747c">Promoted</text>
    <text x="0" y="110" font-family="Inter, Arial, sans-serif" font-size="18" text-anchor="middle" fill="#5d6870">Hierarchy →</text>
  </g>
  </g>

  <text x="700" y="790" text-anchor="middle" fill="#5d6870" font-family="Inter, Arial, sans-serif" font-size="32">Employees rise to the level where they are no longer competent.</text>
</svg>