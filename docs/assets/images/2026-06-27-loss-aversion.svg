<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 933" role="img" aria-labelledby="title desc">
  <title id="title">Loss Aversion</title>
  <desc id="desc">A diagram of a tilted balance scale illustrating Loss Aversion: the pain of a 100-dollar loss weighs twice as heavily as the joy of a 100-dollar gain.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#f4f2ec"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="20" flood-color="#17212b" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect width="1400" height="933" fill="url(#bg)"/>
  <rect x="160" y="126" width="1080" height="680" rx="18" fill="#ffffff" filter="url(#shadow)"/>
  
  <text x="220" y="204" fill="#2e6678" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">LOSS AVERSION</text>

  <!-- Scale base and stand -->
  <g stroke="#68747c" stroke-width="4" stroke-linecap="round" fill="none">
    <!-- Stand Pillar -->
    <line x1="700" y1="360" x2="700" y2="620" stroke-width="6"/>
    <!-- Triangular base -->
    <path d="M 620 620 L 780 620 L 700 600 Z" fill="#68747c" stroke-linejoin="round"/>
    
    <!-- Balance beam (tilted) -->
    <line x1="480" y1="460" x2="920" y2="340" stroke="#333333" stroke-width="8"/>
    <!-- Center pivot pin -->
    <circle cx="700" cy="400" r="10" fill="#c59838" stroke="#333333" stroke-width="3"/>
  </g>

  <!-- Left Side: Loss (Lower / Heavier) -->
  <g>
    <!-- Hanger wires -->
    <path d="M 480 460 L 410 570 M 480 460 L 550 570" stroke="#68747c" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Platform -->
    <line x1="390" y1="570" x2="570" y2="570" stroke="#333333" stroke-width="4" stroke-linecap="round"/>
    
    <!-- Big red weight -->
    <rect x="420" y="470" width="120" height="100" rx="6" fill="#c95b4d"/>
    <text x="480" y="525" text-anchor="middle" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="900">-$100</text>
    
    <!-- Labels -->
    <text x="480" y="615" text-anchor="middle" fill="#c95b4d" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">PAIN OF LOSS</text>
    <text x="480" y="645" text-anchor="middle" fill="#68747c" font-family="Inter, Arial, sans-serif" font-size="15">Psychologically twice as heavy</text>
  </g>

  <!-- Right Side: Gain (Higher / Lighter) -->
  <g>
    <!-- Hanger wires -->
    <path d="M 920 340 L 850 450 M 920 340 L 990 450" stroke="#68747c" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Platform -->
    <line x1="830" y1="450" x2="1010" y2="450" stroke="#333333" stroke-width="4" stroke-linecap="round"/>
    
    <!-- Small teal weight (physically smaller to show perceived weight difference) -->
    <rect x="860" y="400" width="120" height="50" rx="6" fill="#1f7a8c"/>
    <text x="920" y="432" text-anchor="middle" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="900">+$100</text>
    
    <!-- Labels -->
    <text x="920" y="495" text-anchor="middle" fill="#1f7a8c" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">JOY OF GAIN</text>
    <text x="920" y="525" text-anchor="middle" fill="#68747c" font-family="Inter, Arial, sans-serif" font-size="15">Perceived as much lighter</text>
  </g>

  <!-- Bottom Message -->
  <text x="700" y="790" text-anchor="middle" fill="#5d6870" font-family="Inter, Arial, sans-serif" font-size="32">"Losses loom larger than gains."</text>
</svg>
