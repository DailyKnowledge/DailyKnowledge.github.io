<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 933" role="img" aria-labelledby="title desc">
  <title id="title">Availability heuristic</title>
  <desc id="desc">A diagram showing vivid memories standing out from quieter background examples.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fbfaf6"/>
      <stop offset="1" stop-color="#edf5f2"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="20" flood-color="#16211f" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="1400" height="933" fill="url(#bg)"/>
  <rect x="160" y="126" width="1080" height="680" rx="18" fill="#fff" filter="url(#shadow)"/>
  <text x="220" y="204" fill="#2f665b" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">AVAILABILITY HEURISTIC</text>

  <rect x="245" y="270" width="380" height="360" rx="22" fill="#eef6f3" stroke="#1f7a8c" stroke-width="7"/>
  <text x="435" y="326" text-anchor="middle" fill="#16211f" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="700">memory</text>
  <circle cx="350" cy="424" r="60" fill="#c75c4a"/>
  <circle cx="470" cy="510" r="54" fill="#c59838"/>
  <circle cx="498" cy="400" r="22" fill="#b7c7c2"/>
  <circle cx="342" cy="540" r="20" fill="#b7c7c2"/>
  <circle cx="552" cy="556" r="18" fill="#b7c7c2"/>
  <text x="350" y="434" text-anchor="middle" fill="#fff" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="700">vivid</text>
  <text x="470" y="520" text-anchor="middle" fill="#16211f" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="700">recent</text>

  <path d="M650 450 H790" stroke="#1f7a8c" stroke-width="12" stroke-linecap="round"/>
  <path d="M790 450 L746 414 L746 486 Z" fill="#1f7a8c"/>

  <rect x="820" y="270" width="335" height="360" rx="22" fill="#f8eeee" stroke="#c75c4a" stroke-width="7"/>
  <text x="988" y="326" text-anchor="middle" fill="#16211f" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="700">judgment</text>
  <text x="988" y="408" text-anchor="middle" fill="#c75c4a" font-family="Inter, Arial, sans-serif" font-size="48" font-weight="700">feels</text>
  <text x="988" y="466" text-anchor="middle" fill="#c75c4a" font-family="Inter, Arial, sans-serif" font-size="48" font-weight="700">common</text>
  <line x1="900" y1="528" x2="1076" y2="528" stroke="#c59838" stroke-width="8" stroke-linecap="round"/>
  <line x1="900" y1="566" x2="1018" y2="566" stroke="#c59838" stroke-width="8" stroke-linecap="round" opacity="0.55"/>

  <text x="260" y="724" fill="#5c6b66" font-family="Inter, Arial, sans-serif" font-size="32">easy to remember is not the same as frequent</text>
</svg>
