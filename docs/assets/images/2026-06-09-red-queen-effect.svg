<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 933" role="img" aria-labelledby="title desc">
  <title id="title">The Red Queen Effect</title>
  <desc id="desc">A diagram illustrating the Red Queen Effect: the need for continuous evolution and adaptation just to maintain relative position.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#f4f2ec"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="20" flood-color="#17212b" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect width="1400" height="933" fill="url(#bg)"/>
  <rect x="160" y="126" width="1080" height="680" rx="18" fill="#ffffff" filter="url(#shadow)"/>
  
  <text x="220" y="204" fill="#2e6678" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">THE RED QUEEN EFFECT</text>

  <!-- Ground / Path -->
  <rect x="250" y="550" width="900" height="4" fill="#dfe4dc"/>
  
  <!-- Runners (Abstracted) -->
  <g id="runner-1" transform="translate(400, 480)">
    <circle cx="0" cy="0" r="12" fill="#c95b4d"/>
    <path d="M 0 12 L 0 40 M -10 25 L 10 25 M 0 40 L -10 60 M 0 40 L 10 60" stroke="#c95b4d" stroke-width="4" stroke-linecap="round"/>
    <text x="0" y="-25" text-anchor="middle" fill="#c95b4d" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">SYSTEM A</text>
  </g>

  <g id="runner-2" transform="translate(600, 480)">
    <circle cx="0" cy="0" r="12" fill="#1f7a8c"/>
    <path d="M 0 12 L 0 40 M -10 25 L 10 25 M 0 40 L -10 60 M 0 40 L 10 60" stroke="#1f7a8c" stroke-width="4" stroke-linecap="round"/>
    <text x="0" y="-25" text-anchor="middle" fill="#1f7a8c" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">SYSTEM B</text>
  </g>

  <!-- Movement lines -->
  <path d="M 350 450 L 300 450 M 350 480 L 280 480 M 350 510 L 310 510" stroke="#d1d9de" stroke-width="3" stroke-linecap="round"/>
  <path d="M 550 450 L 500 450 M 550 480 L 480 480 M 550 510 L 510 510" stroke="#d1d9de" stroke-width="3" stroke-linecap="round"/>

  <!-- Landscape moving in opposite direction -->
  <g transform="translate(800, 450)">
    <path d="M 0 100 L 100 100 L 50 0 Z" fill="#6b8f71" opacity="0.3"/>
    <path d="M 50 100 L 150 100 L 100 20 Z" fill="#6b8f71" opacity="0.2"/>
    <path d="M 100 40 C 150 40, 180 0, 250 0" fill="none" stroke="#d1d9de" stroke-width="4" stroke-dasharray="10,10"/>
  </g>

  <!-- Central Quote/Concept -->
  <rect x="350" y="280" width="700" height="100" rx="12" fill="#fbfaf6" stroke="#dfe4dc" stroke-width="2"/>
  <text x="700" y="325" text-anchor="middle" fill="#16211f" font-family="Inter, Arial, sans-serif" font-size="22" font-style="italic">"It takes all the running you can do,</text>
  <text x="700" y="355" text-anchor="middle" fill="#16211f" font-family="Inter, Arial, sans-serif" font-size="22" font-style="italic">to keep in the same place."</text>

  <text x="700" y="790" text-anchor="middle" fill="#5d6870" font-family="Inter, Arial, sans-serif" font-size="32">Adaptation is not about moving forward, but staying relevant.</text>
</svg>
