<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 933" role="img" aria-labelledby="title desc">
  <title id="title">The Forgetting Curve</title>
  <desc id="desc">A diagram showing the exponential decay of memory over time and how review sessions strengthen retention.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#f4f2ec"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="20" flood-color="#17212b" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect width="1400" height="933" fill="url(#bg)"/>
  <rect x="160" y="126" width="1080" height="680" rx="18" fill="#ffffff" filter="url(#shadow)"/>
  
  <text x="220" y="204" fill="#2e6678" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">THE FORGETTING CURVE</text>

  <!-- Axes -->
  <line x1="300" y1="650" x2="1100" y2="650" stroke="#d1d9de" stroke-width="4" stroke-linecap="round"/> <!-- Time -->
  <line x1="300" y1="650" x2="300" y2="300" stroke="#d1d9de" stroke-width="4" stroke-linecap="round"/> <!-- Memory -->
  
  <text x="700" y="700" text-anchor="middle" fill="#68747c" font-family="Inter, Arial, sans-serif" font-size="20">Time Elapsed</text>
  <text x="280" y="475" text-anchor="middle" fill="#68747c" font-family="Inter, Arial, sans-serif" font-size="20" transform="rotate(-90, 280, 475)">Retention (%)</text>

  <!-- Initial Forgetting Curve -->
  <path d="M 300 320 Q 400 650, 1100 650" fill="none" stroke="#c95b4d" stroke-width="6" stroke-dasharray="10,10" opacity="0.3"/>
  <text x="500" y="580" fill="#c95b4d" font-family="Inter, Arial, sans-serif" font-size="16" opacity="0.6">Without Review</text>

  <!-- Spaced Repetition Curves -->
  <!-- Review 1 -->
  <path d="M 300 320 Q 350 450, 400 480" fill="none" stroke="#1f7a8c" stroke-width="4"/>
  <circle cx="400" cy="480" r="8" fill="#c59838"/>
  <text x="400" y="460" text-anchor="middle" fill="#c59838" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">REVIEW 1</text>
  <path d="M 400 480 L 400 320" stroke="#c59838" stroke-width="2" stroke-dasharray="4,4"/>
  
  <!-- Curve after Review 1 -->
  <path d="M 400 320 Q 600 500, 800 520" fill="none" stroke="#1f7a8c" stroke-width="4"/>
  <circle cx="800" cy="520" r="8" fill="#c59838"/>
  <text x="800" y="500" text-anchor="middle" fill="#c59838" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">REVIEW 2</text>
  <path d="M 800 520 L 800 320" stroke="#c59838" stroke-width="2" stroke-dasharray="4,4"/>

  <!-- Curve after Review 2 -->
  <path d="M 800 320 Q 950 350, 1100 360" fill="none" stroke="#1f7a8c" stroke-width="4"/>

  <text x="700" y="790" text-anchor="middle" fill="#5d6870" font-family="Inter, Arial, sans-serif" font-size="32">Review early to flatten the curve of forgetting.</text>
</svg>
