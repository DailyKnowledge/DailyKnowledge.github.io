<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 933" role="img" aria-labelledby="title desc">
  <title id="title">The Court Jester Hypothesis</title>
  <desc id="desc">A diagram illustrating the Court Jester Hypothesis: external environmental shocks changing the rules for all competitors.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#f4f2ec"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="20" flood-color="#17212b" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect width="1400" height="933" fill="url(#bg)"/>
  <rect x="160" y="126" width="1080" height="680" rx="18" fill="#ffffff" filter="url(#shadow)"/>
  
  <text x="220" y="204" fill="#2e6678" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">THE COURT JESTER HYPOTHESIS</text>

  <!-- The "Jester" (Environmental Shock) -->
  <path d="M 700 350 L 850 600 L 550 600 Z" fill="#c59838" opacity="0.2"/>
  <path d="M 700 250 L 750 350 L 650 350 Z" fill="#c59838"/> <!-- Jester Hat Top -->
  <circle cx="750" cy="350" r="8" fill="#c59838"/>
  <circle cx="650" cy="350" r="8" fill="#c59838"/>
  <text x="700" y="420" text-anchor="middle" fill="#c59838" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800">EXTERNAL SHOCK</text>
  <text x="700" y="450" text-anchor="middle" fill="#68747c" font-family="Inter, Arial, sans-serif" font-size="18">(Climate, Tectonics, Asteroids)</text>

  <!-- The Ground Breaking -->
  <path d="M 250 600 L 500 600 M 550 620 L 850 580 M 900 600 L 1150 600" stroke="#c95b4d" stroke-width="6" stroke-linecap="round"/>
  
  <!-- Disrupted Runners -->
  <g id="runner-1" transform="translate(400, 530) rotate(-20)">
    <circle cx="0" cy="0" r="12" fill="#d1d9de"/>
    <path d="M 0 12 L 0 40 M -10 25 L 10 25 M 0 40 L -10 60 M 0 40 L 10 60" stroke="#d1d9de" stroke-width="4" stroke-linecap="round"/>
  </g>

  <g id="runner-2" transform="translate(1000, 530) rotate(15)">
    <circle cx="0" cy="0" r="12" fill="#d1d9de"/>
    <path d="M 0 12 L 0 40 M -10 25 L 10 25 M 0 40 L -10 60 M 0 40 L 10 60" stroke="#d1d9de" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- Impact Lines -->
  <path d="M 700 500 L 700 700" stroke="#c59838" stroke-width="2" stroke-dasharray="10,10"/>
  <path d="M 600 550 L 400 650" stroke="#c59838" stroke-width="2" stroke-dasharray="10,10"/>
  <path d="M 800 550 L 1000 650" stroke="#c59838" stroke-width="2" stroke-dasharray="10,10"/>

  <text x="700" y="790" text-anchor="middle" fill="#5d6870" font-family="Inter, Arial, sans-serif" font-size="32">When the environment changes, the old race is over.</text>
</svg>
