<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 933" role="img" aria-labelledby="title desc">
  <title id="title">Goodhart's Law</title>
  <desc id="desc">A diagram illustrating Goodhart's Law.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#f4f2ec"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="20" flood-color="#17212b" flood-opacity="0.14"/>
    </filter>
    
    
    
    
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#c59838" />
    </marker>
  
  
  </defs>
  <rect width="1400" height="933" fill="url(#bg)"/>
  <rect x="160" y="126" width="1080" height="680" rx="18" fill="#ffffff" filter="url(#shadow)"/>
  
  <text x="220" y="204" fill="#2e6678" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">GOODHART'S LAW</text>

  <g transform="translate(160.0, 196.0) scale(1.35)">
    <!-- Axes -->
  <line x1="100" y1="350" x2="700" y2="350" stroke="#5d6870" stroke-width="2" /> <!-- X-Axis -->
  <line x1="100" y1="300" x2="100" y2="100" stroke="#5d6870" stroke-width="2" />  <!-- Y-Axis -->
  
  <!-- Target Line (Vertical) -->
  <line x1="350" y1="300" x2="350" y2="80" stroke="#c95b4d" stroke-width="2" stroke-dasharray="8,4" />
  <text x="360" y="95" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="bold" fill="#c95b4d">Target Set</text>

  <!-- Reality Line (The thing we actually care about) -->
  <path d="M 100 220 Q 225 215 350 210 T 700 205" fill="none" stroke="#2e6678" stroke-width="3" stroke-linecap="round" />
  <text x="610" y="195" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="bold" fill="#2e6678">True Value</text>

  <!-- Metric Line (The thing being measured) -->
  <path d="M 100 220 Q 225 215 350 210 Q 525 140 700 90" fill="none" stroke="#1f7a8c" stroke-width="3" stroke-linecap="round" stroke-dasharray="8,4" />
  <text x="610" y="85" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="bold" fill="#1f7a8c">Metric (Gamed)</text>

  <!-- Labels -->
  <text x="400" y="340" font-family="Inter, Arial, sans-serif" font-size="16" text-anchor="middle" fill="#68747c">Time</text>
  <text x="80" y="200" font-family="Inter, Arial, sans-serif" font-size="16" text-anchor="middle" transform="rotate(-90 80,200)" fill="#68747c">Performance</text>

  
  

  <!-- Annotation -->
  <text x="525" y="160" font-family="Inter, Arial, sans-serif" font-size="16" font-style="italic" text-anchor="middle" fill="#c59838">"Gaming the System"</text>
  </g>

  <text x="700" y="790" text-anchor="middle" fill="#5d6870" font-family="Inter, Arial, sans-serif" font-size="32">When a measure becomes a target, it ceases to be a good measure.</text>
</svg>