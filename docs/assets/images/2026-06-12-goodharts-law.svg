<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="400" fill="#fcfcfc" rx="8"/>
  
  <!-- Grid Lines -->
  <line x1="100" y1="300" x2="700" y2="300" stroke="#eee" stroke-width="1" />
  <line x1="100" y1="200" x2="700" y2="200" stroke="#eee" stroke-width="1" />
  <line x1="100" y1="100" x2="700" y2="100" stroke="#eee" stroke-width="1" />

  <!-- Axes -->
  <line x1="100" y1="350" x2="700" y2="350" stroke="#444" stroke-width="2" /> <!-- X-Axis -->
  <line x1="100" y1="350" x2="100" y2="50" stroke="#444" stroke-width="2" />  <!-- Y-Axis -->
  
  <!-- Target Line (Vertical) -->
  <line x1="350" y1="350" x2="350" y2="50" stroke="#e74c3c" stroke-width="2" stroke-dasharray="8,4" />
  <text x="360" y="70" font-family="sans-serif" font-size="14" font-weight="bold" fill="#e74c3c">Target Established</text>

  <!-- Reality Line (The thing we actually care about) -->
  <path d="M 100 250 Q 225 240 350 230 T 700 220" fill="none" stroke="#2c3e50" stroke-width="4" stroke-linecap="round" />
  <text x="610" y="210" font-family="sans-serif" font-size="14" font-weight="bold" fill="#2c3e50">Reality / Quality</text>

  <!-- Metric Line (The thing being measured) -->
  <path d="M 100 250 Q 225 240 350 230 Q 525 150 700 80" fill="none" stroke="#3498db" stroke-width="4" stroke-linecap="round" stroke-dasharray="10,5" />
  <text x="610" y="70" font-family="sans-serif" font-size="14" font-weight="bold" fill="#3498db">Measured Metric</text>

  <!-- Labels -->
  <text x="400" y="385" font-family="sans-serif" font-size="16" text-anchor="middle" fill="#666">Time</text>
  <text x="40" y="200" font-family="sans-serif" font-size="16" text-anchor="middle" transform="rotate(-90 40,200)" fill="#666">Performance</text>

  <!-- Annotation -->
  <text x="525" y="150" font-family="sans-serif" font-size="12" font-style="italic" text-anchor="middle" fill="#e67e22">"Gaming the System"</text>
  <path d="M 480 155 Q 525 180 570 155" fill="none" stroke="#e67e22" stroke-width="1.5" marker-end="url(#arrow)"/>
</svg>