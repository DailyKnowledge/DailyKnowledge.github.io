<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 933" role="img" aria-labelledby="title desc">
  <title id="title">Le Chatelier's Principle</title>
  <desc id="desc">A diagram showing equilibrium shifting to counter a disturbance.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f7fbf8"/>
      <stop offset="1" stop-color="#eef3fa"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="20" flood-color="#18212b" flood-opacity="0.14"/>
    </filter>
    <marker id="arrowBlue" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto">
      <path d="M1 1 L12 7 L1 13 Z" fill="#2b6c8f"/>
    </marker>
    <marker id="arrowRed" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto">
      <path d="M1 1 L12 7 L1 13 Z" fill="#c84f4a"/>
    </marker>
  </defs>
  <rect width="1400" height="933" fill="url(#bg)"/>
  <rect x="160" y="126" width="1080" height="680" rx="18" fill="#ffffff" filter="url(#shadow)"/>
  <text x="220" y="204" fill="#2b6c8f" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">LE CHATELIER'S PRINCIPLE</text>

  <line x1="280" y1="488" x2="1120" y2="488" stroke="#c9d2da" stroke-width="12" stroke-linecap="round"/>
  <circle cx="700" cy="488" r="22" fill="#27313d"/>
  <text x="700" y="548" text-anchor="middle" fill="#27313d" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">equilibrium</text>

  <rect x="260" y="314" width="250" height="128" rx="16" fill="#eff7f1" stroke="#a9cdb3" stroke-width="4"/>
  <text x="385" y="366" text-anchor="middle" fill="#2f6b43" font-family="Inter, Arial, sans-serif" font-size="31" font-weight="700">reactants</text>
  <text x="385" y="407" text-anchor="middle" fill="#65717f" font-family="Inter, Arial, sans-serif" font-size="25">added stress</text>

  <rect x="890" y="314" width="250" height="128" rx="16" fill="#f2f6fb" stroke="#aac2d6" stroke-width="4"/>
  <text x="1015" y="366" text-anchor="middle" fill="#2b6c8f" font-family="Inter, Arial, sans-serif" font-size="31" font-weight="700">products</text>
  <text x="1015" y="407" text-anchor="middle" fill="#65717f" font-family="Inter, Arial, sans-serif" font-size="25">new balance</text>

  <path d="M400 488 C 480 430, 570 410, 660 444" fill="none" stroke="#c84f4a" stroke-width="12" stroke-linecap="round" marker-end="url(#arrowRed)"/>
  <text x="494" y="382" text-anchor="middle" fill="#c84f4a" font-family="Inter, Arial, sans-serif" font-size="27" font-weight="700">disturbance</text>

  <path d="M720 444 C 820 404, 925 426, 1010 488" fill="none" stroke="#2b6c8f" stroke-width="12" stroke-linecap="round" marker-end="url(#arrowBlue)"/>
  <text x="868" y="382" text-anchor="middle" fill="#2b6c8f" font-family="Inter, Arial, sans-serif" font-size="27" font-weight="700">shift to reduce it</text>

  <circle cx="330" cy="610" r="30" fill="#3f9d5a"/>
  <circle cx="390" cy="610" r="30" fill="#3f9d5a"/>
  <circle cx="450" cy="610" r="30" fill="#3f9d5a"/>
  <circle cx="360" cy="670" r="30" fill="#3f9d5a"/>
  <circle cx="420" cy="670" r="30" fill="#3f9d5a"/>
  <text x="390" y="744" text-anchor="middle" fill="#2f6b43" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">more on one side</text>

  <circle cx="955" cy="623" r="30" fill="#4c91bd"/>
  <circle cx="1015" cy="623" r="30" fill="#4c91bd"/>
  <circle cx="1075" cy="623" r="30" fill="#4c91bd"/>
  <text x="1015" y="744" text-anchor="middle" fill="#2b6c8f" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">system adjusts</text>

  <text x="700" y="788" text-anchor="middle" fill="#5a6470" font-family="Inter, Arial, sans-serif" font-size="32">a disturbed balance moves toward the response that absorbs the change</text>
</svg>
