<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 933" role="img" aria-labelledby="title desc">
  <title id="title">Negative Space (Ma)</title>
  <desc id="desc">A diagram illustrating the importance of negative space in art and composition.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#f4f2ec"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="20" flood-color="#17212b" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect width="1400" height="933" fill="url(#bg)"/>
  <rect x="160" y="126" width="1080" height="680" rx="18" fill="#ffffff" filter="url(#shadow)"/>
  
  <text x="220" y="204" fill="#2e6678" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">NEGATIVE SPACE (MA)</text>

  <!-- Left: Crowded (No Space) -->
  <g transform="translate(250, 300)">
    <rect width="400" height="300" rx="12" fill="#f1f4ed" stroke="#dfe4dc" stroke-width="2"/>
    <circle cx="50" cy="50" r="30" fill="#c95b4d"/>
    <circle cx="120" cy="80" r="40" fill="#1f7a8c"/>
    <circle cx="200" cy="60" r="25" fill="#c59838"/>
    <circle cx="280" cy="90" r="45" fill="#6b8f71"/>
    <circle cx="350" cy="50" r="35" fill="#2e6678"/>
    <rect x="50" y="150" width="300" height="120" fill="#16211f" opacity="0.8"/>
    <text x="200" y="340" text-anchor="middle" fill="#68747c" font-family="Inter, Arial, sans-serif" font-size="20">Crowded / Noise</text>
  </g>

  <!-- Right: Balanced (Negative Space) -->
  <g transform="translate(750, 300)">
    <rect width="400" height="300" rx="12" fill="#f1f4ed" stroke="#dfe4dc" stroke-width="2"/>
    <circle cx="200" cy="150" r="60" fill="#1f7a8c"/>
    <text x="200" y="340" text-anchor="middle" fill="#68747c" font-family="Inter, Arial, sans-serif" font-size="20">Balance / Focus</text>
  </g>

  <!-- Connection Label -->
  <text x="700" y="680" text-anchor="middle" fill="#2e6678" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">The space between defines the object.</text>

  <text x="700" y="790" text-anchor="middle" fill="#5d6870" font-family="Inter, Arial, sans-serif" font-size="32">Silence is the canvas upon which music is painted.</text>
</svg>
