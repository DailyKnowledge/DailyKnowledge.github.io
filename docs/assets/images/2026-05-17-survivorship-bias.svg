<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 933" role="img" aria-labelledby="title desc">
  <title id="title">Survivorship bias</title>
  <desc id="desc">A visual showing visible surviving examples and faded missing examples outside the frame.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fbfaf6"/>
      <stop offset="1" stop-color="#edf4f7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="20" flood-color="#16211f" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="1400" height="933" fill="url(#bg)"/>
  <rect x="170" y="118" width="1060" height="700" rx="18" fill="#fff" filter="url(#shadow)"/>
  <rect x="280" y="220" width="500" height="430" rx="14" fill="#eef6f3" stroke="#1f7a8c" stroke-width="5"/>
  <text x="530" y="278" text-anchor="middle" fill="#16211f" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">visible survivors</text>
  <g fill="#1f7a8c">
    <circle cx="390" cy="372" r="22"/>
    <circle cx="512" cy="342" r="22"/>
    <circle cx="628" cy="396" r="22"/>
    <circle cx="450" cy="506" r="22"/>
    <circle cx="598" cy="548" r="22"/>
  </g>
  <g fill="#c75c4a" opacity="0.22">
    <circle cx="920" cy="266" r="22"/>
    <circle cx="1016" cy="340" r="22"/>
    <circle cx="936" cy="460" r="22"/>
    <circle cx="1052" cy="558" r="22"/>
    <circle cx="884" cy="642" r="22"/>
  </g>
  <path d="M824 204 L 1130 204 L 1130 690 L 824 690 Z" fill="none" stroke="#c75c4a" stroke-width="5" stroke-dasharray="16 14" opacity="0.55"/>
  <text x="976" y="746" text-anchor="middle" fill="#5c6b66" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">missing cases</text>
  <path d="M780 430 C 836 402, 866 388, 912 366" fill="none" stroke="#c59838" stroke-width="10" stroke-linecap="round"/>
  <path d="M912 366 L 858 356 L 886 410 Z" fill="#c59838"/>
  <text x="220" y="184" fill="#2f665b" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">SURVIVORSHIP BIAS</text>
  <text x="250" y="728" fill="#5c6b66" font-family="Inter, Arial, sans-serif" font-size="30">the visible sample may not represent the full process</text>
</svg>
