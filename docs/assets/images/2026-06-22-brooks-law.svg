<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 933" role="img" aria-labelledby="title desc">
  <title id="title">Brooks' Law</title>
  <desc id="desc">A diagram comparing a small team of 4 people with 6 communication channels and a double-sized team of 8 people with 28 communication channels, showing quadratic growth of overhead.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#f4f2ec"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="20" flood-color="#17212b" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect width="1400" height="933" fill="url(#bg)"/>
  <rect x="160" y="126" width="1080" height="680" rx="18" fill="#ffffff" filter="url(#shadow)"/>
  
  <text x="220" y="204" fill="#2e6678" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">BROOKS' LAW</text>

  <!-- Left Side: Small Team -->
  <g>
    <!-- Text Labels -->
    <text x="400" y="280" text-anchor="middle" fill="#2e6678" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">Small Team (N = 4)</text>
    <text x="400" y="585" text-anchor="middle" fill="#1f7a8c" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">6 Channels of Communication</text>
    <text x="400" y="615" text-anchor="middle" fill="#68747c" font-family="Inter, Arial, sans-serif" font-size="14">Highly cohesive, low overhead</text>

    <!-- Connections (6 lines) -->
    <g stroke="#1f7a8c" stroke-width="2.5" opacity="0.8">
      <line x1="500" y1="420" x2="400" y2="520" />
      <line x1="500" y1="420" x2="300" y2="420" />
      <line x1="500" y1="420" x2="400" y2="320" />
      <line x1="400" y1="520" x2="300" y2="420" />
      <line x1="400" y1="520" x2="400" y2="320" />
      <line x1="300" y1="420" x2="400" y2="320" />
    </g>

    <!-- Nodes (4 people) -->
    <circle cx="500" cy="420" r="16" fill="#1f7a8c" stroke="#ffffff" stroke-width="3"/>
    <circle cx="400" cy="520" r="16" fill="#1f7a8c" stroke="#ffffff" stroke-width="3"/>
    <circle cx="300" cy="420" r="16" fill="#1f7a8c" stroke="#ffffff" stroke-width="3"/>
    <circle cx="400" cy="320" r="16" fill="#1f7a8c" stroke="#ffffff" stroke-width="3"/>
  </g>

  <!-- Right Side: Double Team -->
  <g>
    <!-- Text Labels -->
    <text x="950" y="280" text-anchor="middle" fill="#c95b4d" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">Expanded Team (N = 8)</text>
    <text x="950" y="585" text-anchor="middle" fill="#c95b4d" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">28 Channels of Communication</text>
    <text x="950" y="615" text-anchor="middle" fill="#68747c" font-family="Inter, Arial, sans-serif" font-size="14">Quadratic overhead growth (+360%)</text>

    <!-- Connections (28 lines) -->
    <g stroke="#c95b4d" stroke-width="1.5" opacity="0.6">
      <!-- Node 0 connects -->
      <line x1="1070" y1="420" x2="1035" y2="505" />
      <line x1="1070" y1="420" x2="950" y2="540" />
      <line x1="1070" y1="420" x2="865" y2="505" />
      <line x1="1070" y1="420" x2="830" y2="420" />
      <line x1="1070" y1="420" x2="865" y2="335" />
      <line x1="1070" y1="420" x2="950" y2="300" />
      <line x1="1070" y1="420" x2="1035" y2="335" />

      <!-- Node 1 connects -->
      <line x1="1035" y1="505" x2="950" y2="540" />
      <line x1="1035" y1="505" x2="865" y2="505" />
      <line x1="1035" y1="505" x2="830" y2="420" />
      <line x1="1035" y1="505" x2="865" y2="335" />
      <line x1="1035" y1="505" x2="950" y2="300" />
      <line x1="1035" y1="505" x2="1035" y2="335" />

      <!-- Node 2 connects -->
      <line x1="950" y1="540" x2="865" y2="505" />
      <line x1="950" y1="540" x2="830" y2="420" />
      <line x1="950" y1="540" x2="865" y2="335" />
      <line x1="950" y1="540" x2="950" y2="300" />
      <line x1="950" y1="540" x2="1035" y2="335" />

      <!-- Node 3 connects -->
      <line x1="865" y1="505" x2="830" y2="420" />
      <line x1="865" y1="505" x2="865" y2="335" />
      <line x1="865" y1="505" x2="950" y2="300" />
      <line x1="865" y1="505" x2="1035" y2="335" />

      <!-- Node 4 connects -->
      <line x1="830" y1="420" x2="865" y2="335" />
      <line x1="830" y1="420" x2="950" y2="300" />
      <line x1="830" y1="420" x2="1035" y2="335" />

      <!-- Node 5 connects -->
      <line x1="865" y1="335" x2="950" y2="300" />
      <line x1="865" y1="335" x2="1035" y2="335" />

      <!-- Node 6 connects -->
      <line x1="950" y1="300" x2="1035" y2="335" />
    </g>

    <!-- Nodes (8 people) -->
    <circle cx="1070" cy="420" r="14" fill="#c95b4d" stroke="#ffffff" stroke-width="2.5"/>
    <circle cx="1035" cy="505" r="14" fill="#c95b4d" stroke="#ffffff" stroke-width="2.5"/>
    <circle cx="950" cy="540" r="14" fill="#c95b4d" stroke="#ffffff" stroke-width="2.5"/>
    <circle cx="865" cy="505" r="14" fill="#c95b4d" stroke="#ffffff" stroke-width="2.5"/>
    <circle cx="830" cy="420" r="14" fill="#c95b4d" stroke="#ffffff" stroke-width="2.5"/>
    <circle cx="865" cy="335" r="14" fill="#c95b4d" stroke="#ffffff" stroke-width="2.5"/>
    <circle cx="950" cy="300" r="14" fill="#c95b4d" stroke="#ffffff" stroke-width="2.5"/>
    <circle cx="1035" cy="335" r="14" fill="#c95b4d" stroke="#ffffff" stroke-width="2.5"/>
  </g>

  <!-- Formula in Center -->
  <g transform="translate(615, 380)">
    <rect x="-10" y="-10" stroke="#dfe4dc" stroke-width="2" fill="#f8fbff" width="170" height="90" rx="8" />
    <text x="75" y="25" text-anchor="middle" fill="#68747c" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">Formula</text>
    <text x="75" y="55" text-anchor="middle" fill="#2e6678" font-family="Inter, Georgia, serif" font-style="italic" font-size="22" font-weight="700">C = n(n-1) / 2</text>
  </g>

  <!-- Bottom Message -->
  <text x="700" y="790" text-anchor="middle" fill="#5d6870" font-family="Inter, Arial, sans-serif" font-size="32">"Adding manpower to a late software project makes it later."</text>
</svg>
