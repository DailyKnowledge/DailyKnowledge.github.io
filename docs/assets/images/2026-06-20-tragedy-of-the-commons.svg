<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 933" role="img" aria-labelledby="title desc">
  <title id="title">Tragedy of the Commons</title>
  <desc id="desc">A diagram showing the comparison between individual incentives and the collective outcome of a shared resource.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#f4f2ec"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="20" flood-color="#17212b" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect width="1400" height="933" fill="url(#bg)"/>
  <rect x="160" y="126" width="1080" height="680" rx="18" fill="#ffffff" filter="url(#shadow)"/>
  
  <text x="220" y="204" fill="#2e6678" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">TRAGEDY OF THE COMMONS</text>

  <!-- Left Column: Individual Logic -->
  <g transform="translate(240, 270)">
    <!-- Pasture (Healthy) -->
    <rect x="0" y="0" width="380" height="240" rx="12" fill="#e8f3e5" stroke="#71a965" stroke-width="3"/>
    
    <!-- Grass details -->
    <path d="M 50 180 L 50 160 M 55 180 L 60 165 M 45 180 L 40 165" stroke="#71a965" stroke-width="3" stroke-linecap="round"/>
    <path d="M 120 100 L 120 80 M 125 100 L 130 85 M 115 100 L 110 85" stroke="#71a965" stroke-width="3" stroke-linecap="round"/>
    <path d="M 300 150 L 300 130 M 305 150 L 310 135 M 295 150 L 290 135" stroke="#71a965" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Cow Icon/Symbol (Simplified) -->
    <rect x="150" y="120" width="80" height="50" rx="8" fill="#ffffff" stroke="#333333" stroke-width="3"/>
    <rect x="215" y="110" width="25" height="25" rx="4" fill="#ffffff" stroke="#333333" stroke-width="3"/>
    <!-- Cow spots/details -->
    <circle cx="170" cy="140" r="8" fill="#333333"/>
    <circle cx="195" cy="150" r="6" fill="#333333"/>
    <!-- Legs -->
    <line x1="165" y1="170" x2="165" y2="190" stroke="#333333" stroke-width="4" stroke-linecap="round"/>
    <line x1="180" y1="170" x2="180" y2="190" stroke="#333333" stroke-width="4" stroke-linecap="round"/>
    <line x1="200" y1="170" x2="200" y2="190" stroke="#333333" stroke-width="4" stroke-linecap="round"/>
    <line x1="215" y1="170" x2="215" y2="190" stroke="#333333" stroke-width="4" stroke-linecap="round"/>

    <text x="190" y="-30" text-anchor="middle" fill="#2e6678" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">INDIVIDUAL INCENTIVE</text>
    <text x="190" y="295" text-anchor="middle" fill="#388e3c" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Gain: +1 (100% of profit)</text>
    <text x="190" y="325" text-anchor="middle" fill="#68747c" font-family="Inter, Arial, sans-serif" font-size="16">Cost: Shared by everyone</text>
  </g>

  <!-- Connection: Arrow / Warning -->
  <g transform="translate(660, 360)">
    <!-- Right arrow with line -->
    <path d="M 0 30 L 80 30" stroke="#c59838" stroke-width="4" stroke-dasharray="6,4"/>
    <path d="M 80 30 L 70 20 M 80 30 L 70 40" stroke="#c59838" stroke-width="4" stroke-linecap="round"/>
    <text x="40" y="10" text-anchor="middle" fill="#c59838" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">X MANY USERS</text>
  </g>

  <!-- Right Column: Collective Outcome -->
  <g transform="translate(780, 270)">
    <!-- Pasture (Depleted) -->
    <rect x="0" y="0" width="380" height="240" rx="12" fill="#f5ebe6" stroke="#c95b4d" stroke-width="3"/>
    
    <!-- Withered grass / cracks -->
    <path d="M 50 180 L 45 170 M 120 100 L 115 90 M 300 150 L 295 140" stroke="#a0857a" stroke-width="2" stroke-linecap="round"/>
    <path d="M 220 80 Q 240 90 230 110" fill="none" stroke="#d5c2ba" stroke-width="2"/>
    <path d="M 80 120 Q 90 140 70 150" fill="none" stroke="#d5c2ba" stroke-width="2"/>

    <!-- Multiple Cow Icons (Smaller/Crowded) -->
    <!-- Cow 1 -->
    <g transform="translate(30, 40) scale(0.7)">
      <rect x="150" y="120" width="80" height="50" rx="8" fill="#ebebeb" stroke="#777777" stroke-width="2"/>
      <rect x="215" y="110" width="25" height="25" rx="4" fill="#ebebeb" stroke="#777777" stroke-width="2"/>
      <circle cx="170" cy="140" r="8" fill="#777777"/>
      <line x1="165" y1="170" x2="165" y2="190" stroke="#777777" stroke-width="3"/>
      <line x1="180" y1="170" x2="180" y2="190" stroke="#777777" stroke-width="3"/>
      <line x1="200" y1="170" x2="200" y2="190" stroke="#777777" stroke-width="3"/>
      <line x1="215" y1="170" x2="215" y2="190" stroke="#777777" stroke-width="3"/>
    </g>
    <!-- Cow 2 -->
    <g transform="translate(140, 70) scale(0.7)">
      <rect x="150" y="120" width="80" height="50" rx="8" fill="#ebebeb" stroke="#777777" stroke-width="2"/>
      <rect x="215" y="110" width="25" height="25" rx="4" fill="#ebebeb" stroke="#777777" stroke-width="2"/>
      <circle cx="170" cy="140" r="8" fill="#777777"/>
      <line x1="165" y1="170" x2="165" y2="190" stroke="#777777" stroke-width="3"/>
      <line x1="180" y1="170" x2="180" y2="190" stroke="#777777" stroke-width="3"/>
      <line x1="200" y1="170" x2="200" y2="190" stroke="#777777" stroke-width="3"/>
      <line x1="215" y1="170" x2="215" y2="190" stroke="#777777" stroke-width="3"/>
    </g>
    <!-- Cow 3 -->
    <g transform="translate(80, 110) scale(0.7)">
      <rect x="150" y="120" width="80" height="50" rx="8" fill="#ebebeb" stroke="#777777" stroke-width="2"/>
      <rect x="215" y="110" width="25" height="25" rx="4" fill="#ebebeb" stroke="#777777" stroke-width="2"/>
      <circle cx="170" cy="140" r="8" fill="#777777"/>
      <line x1="165" y1="170" x2="165" y2="190" stroke="#777777" stroke-width="3"/>
      <line x1="180" y1="170" x2="180" y2="190" stroke="#777777" stroke-width="3"/>
      <line x1="200" y1="170" x2="200" y2="190" stroke="#777777" stroke-width="3"/>
      <line x1="215" y1="170" x2="215" y2="190" stroke="#777777" stroke-width="3"/>
    </g>

    <text x="190" y="-30" text-anchor="middle" fill="#c95b4d" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">COLLECTIVE OUTCOME</text>
    <text x="190" y="295" text-anchor="middle" fill="#c95b4d" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Pasture is overgrazed &amp; depleted</text>
    <text x="190" y="325" text-anchor="middle" fill="#68747c" font-family="Inter, Arial, sans-serif" font-size="16">Total value drops to zero for all</text>
  </g>

  <text x="700" y="790" text-anchor="middle" fill="#5d6870" font-family="Inter, Arial, sans-serif" font-size="32">Without governance, shared resources face collapse.</text>
</svg>
