<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 933" role="img" aria-labelledby="title desc">
  <title id="title">Parkinson's Law</title>
  <desc id="desc">A diagram illustrating Parkinson's Law: work expanding to fill the time available.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#f4f2ec"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="20" flood-color="#17212b" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect width="1400" height="933" fill="url(#bg)"/>
  <rect x="160" y="126" width="1080" height="680" rx="18" fill="#ffffff" filter="url(#shadow)"/>
  
  <text x="220" y="204" fill="#2e6678" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">PARKINSON'S LAW</text>

  <g transform="translate(320, 320)">
    <!-- Scenario A: Short Time -->
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="200" height="300" rx="12" fill="none" stroke="#d1d9de" stroke-width="3" stroke-dasharray="8,4"/>
      <text x="100" y="-30" text-anchor="middle" fill="#68747c" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">2 HOURS</text>
      
      <!-- Concentrated Work -->
      <circle cx="100" cy="150" r="60" fill="#1f7a8c"/>
      <text x="100" y="158" text-anchor="middle" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">CORE TASK</text>
    </g>

    <!-- Arrow -->
    <path d="M 280 150 L 380 150" stroke="#c59838" stroke-width="4" fill="none" marker-end="url(#arrow-gold)"/>
    <defs>
      <marker id="arrow-gold" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
        <path d="M0,0 L0,6 L9,3 z" fill="#c59838" />
      </marker>
    </defs>

    <!-- Scenario B: Long Time -->
    <g transform="translate(460, 0)">
      <rect x="0" y="0" width="450" height="300" rx="12" fill="none" stroke="#d1d9de" stroke-width="3" stroke-dasharray="8,4"/>
      <text x="225" y="-30" text-anchor="middle" fill="#68747c" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">2 WEEKS</text>
      
      <!-- Expanded Work (Diffuse) -->
      <rect x="20" y="20" width="410" height="260" rx="8" fill="#1f7a8c" opacity="0.2"/>
      <path d="M 50 50 Q 150 20 250 80 T 400 50 M 30 150 Q 100 200 200 150 T 420 180 M 80 250 Q 200 220 350 260" fill="none" stroke="#1f7a8c" stroke-width="2" opacity="0.4"/>
      
      <circle cx="225" cy="150" r="40" fill="#1f7a8c"/>
      <text x="225" y="158" text-anchor="middle" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">CORE TASK</text>
      
      <text x="80" y="60" fill="#2e6678" font-family="Inter, Arial, sans-serif" font-size="14">Scope Creep</text>
      <text x="320" y="240" fill="#2e6678" font-family="Inter, Arial, sans-serif" font-size="14">Perfectionism</text>
      <text x="350" y="80" fill="#2e6678" font-family="Inter, Arial, sans-serif" font-size="14">Procrastination</text>
    </g>
  </g>

  <text x="700" y="790" text-anchor="middle" fill="#5d6870" font-family="Inter, Arial, sans-serif" font-size="32">Work behaves like a gas; it expands to fill its container.</text>
</svg>
