<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 933" role="img" aria-labelledby="title desc">
  <title id="title">The Lindy Effect</title>
  <desc id="desc">A diagram illustrating The Lindy Effect.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#f4f2ec"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="20" flood-color="#17212b" flood-opacity="0.14"/>
    </filter>
    
    
    
    
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#d1d9de" />
    </marker>
  
  
  </defs>
  <rect width="1400" height="933" fill="url(#bg)"/>
  <rect x="160" y="126" width="1080" height="680" rx="18" fill="#ffffff" filter="url(#shadow)"/>
  
  <text x="220" y="204" fill="#2e6678" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">THE LINDY EFFECT</text>

  <g transform="translate(160.0, 196.0) scale(1.35)">
    <!-- Axes -->
  <line x1="100" y1="300" x2="700" y2="300" stroke="#5d6870" stroke-width="2" /> <!-- X-Axis -->
  <line x1="100" y1="300" x2="100" y2="100" stroke="#5d6870" stroke-width="2" />  <!-- Y-Axis -->

  <!-- Lindy Curve (Linear growth of expectancy) -->
  <line x1="100" y1="300" x2="650" y2="120" stroke="#6b8f71" stroke-width="3" stroke-linecap="round" />
  
  <!-- Biological Decay Curve (Comparison) -->
  <path d="M 100 150 Q 300 160 500 300" fill="none" stroke="#d1d9de" stroke-width="2" stroke-dasharray="5,5" />

  <!-- Points of Interest -->
  <circle cx="200" cy="265" r="5" fill="#6b8f71" />
  <text x="210" y="280" font-family="Inter, Arial, sans-serif" font-size="16" fill="#68747c">New Idea</text>
  
  <circle cx="550" cy="155" r="5" fill="#6b8f71" />
  <text x="500" y="140" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="bold" fill="#6b8f71">The Classics</text>

  <!-- Labels -->
  <text x="400" y="340" font-family="Inter, Arial, sans-serif" font-size="16" text-anchor="middle" fill="#68747c">Current Age</text>
  <text x="80" y="200" font-family="Inter, Arial, sans-serif" font-size="16" text-anchor="middle" transform="rotate(-90 80,200)" fill="#68747c">Future Life Expectancy</text>
  </g>

  <text x="700" y="790" text-anchor="middle" fill="#5d6870" font-family="Inter, Arial, sans-serif" font-size="32">Non-perishable ideas become more likely to survive the longer they have existed.</text>
</svg>