<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 933" role="img" aria-labelledby="title desc">
  <title id="title">Working Memory Capacity</title>
  <desc id="desc">A diagram showing working memory as a limited set of slots, with some being full and others being overwhelmed.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#f4f2ec"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="20" flood-color="#17212b" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect width="1400" height="933" fill="url(#bg)"/>
  <rect x="160" y="126" width="1080" height="680" rx="18" fill="#ffffff" filter="url(#shadow)"/>
  
  <text x="220" y="204" fill="#2e6678" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">WORKING MEMORY</text>

  <!-- The "Workbench" -->
  <rect x="250" y="320" width="900" height="300" rx="12" fill="#f1f4ed" stroke="#dfe4dc" stroke-width="2"/>
  <text x="700" y="360" text-anchor="middle" fill="#5c6b66" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">ACTIVE WORKSPACE (SLOTS)</text>

  <!-- Slots -->
  <g transform="translate(300, 400)">
    <!-- Slot 1: Full -->
    <rect x="0" y="0" width="100" height="150" rx="8" fill="#1f7a8c"/>
    <text x="50" y="180" text-anchor="middle" fill="#1f7a8c" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">INFO 1</text>
    
    <!-- Slot 2: Full -->
    <rect x="130" y="0" width="100" height="150" rx="8" fill="#1f7a8c"/>
    <text x="180" y="180" text-anchor="middle" fill="#1f7a8c" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">INFO 2</text>
    
    <!-- Slot 3: Full -->
    <rect x="260" y="0" width="100" height="150" rx="8" fill="#1f7a8c"/>
    <text x="310" y="180" text-anchor="middle" fill="#1f7a8c" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">INFO 3</text>
    
    <!-- Slot 4: Overflowing -->
    <rect x="390" y="0" width="100" height="150" rx="8" fill="#c95b4d" opacity="0.4" stroke="#c95b4d" stroke-width="2" stroke-dasharray="5,5"/>
    <path d="M 400 20 L 480 130 M 480 20 L 400 130" stroke="#c95b4d" stroke-width="4" stroke-linecap="round"/>
    <text x="440" y="180" text-anchor="middle" fill="#c95b4d" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">OVERFLOW</text>

    <!-- Incoming Information -->
    <g transform="translate(550, -50)">
       <rect x="0" y="0" width="80" height="80" rx="8" fill="#c59838" opacity="0.8"/>
       <path d="M 40 90 L 40 130" stroke="#c59838" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow-gold)"/>
       <text x="40" y="-15" text-anchor="middle" fill="#c59838" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">NEW DATA</text>
    </g>
    
    <text x="700" y="70" text-anchor="middle" fill="#68747c" font-family="Inter, Arial, sans-serif" font-size="20">Cognitive Load</text>
  </g>

  <text x="700" y="790" text-anchor="middle" fill="#5d6870" font-family="Inter, Arial, sans-serif" font-size="32">We can only hold so much in mind at once.</text>
</svg>
