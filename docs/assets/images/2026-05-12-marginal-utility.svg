<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 933" role="img" aria-labelledby="title desc">
  <title id="title">Marginal utility chart</title>
  <desc id="desc">A clean chart showing a curve that rises quickly and then flattens.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f7fbf8"/>
      <stop offset="1" stop-color="#e7f0ea"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="20" flood-color="#16211f" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="1400" height="933" fill="url(#bg)"/>
  <rect x="160" y="126" width="1080" height="680" rx="18" fill="#fff" filter="url(#shadow)"/>
  <line x1="260" y1="686" x2="1118" y2="686" stroke="#16211f" stroke-width="5" stroke-linecap="round"/>
  <line x1="260" y1="686" x2="260" y2="244" stroke="#16211f" stroke-width="5" stroke-linecap="round"/>
  <path d="M270 642 C 342 470, 436 370, 560 324 C 692 275, 846 284, 1094 278" fill="none" stroke="#1f7a8c" stroke-width="18" stroke-linecap="round"/>
  <path d="M270 642 C 342 470, 436 370, 560 324 C 692 275, 846 284, 1094 278" fill="none" stroke="#87c5b2" stroke-width="5" stroke-linecap="round"/>
  <circle cx="348" cy="490" r="20" fill="#c75c4a"/>
  <circle cx="560" cy="324" r="20" fill="#c75c4a"/>
  <circle cx="914" cy="282" r="20" fill="#c75c4a"/>
  <text x="260" y="744" fill="#5c6b66" font-family="Inter, Arial, sans-serif" font-size="34">More units</text>
  <text x="188" y="258" fill="#5c6b66" font-family="Inter, Arial, sans-serif" font-size="34" transform="rotate(-90 188 258)">Utility</text>
  <text x="340" y="560" fill="#16211f" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="700">first units</text>
  <text x="760" y="220" fill="#16211f" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="700">next units add less</text>
  <text x="220" y="188" fill="#c59838" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">MARGINAL UTILITY</text>
</svg>
