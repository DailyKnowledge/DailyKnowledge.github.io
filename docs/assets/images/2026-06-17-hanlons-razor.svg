<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 933" role="img" aria-labelledby="title desc">
  <title id="title">Hanlon's Razor</title>
  <desc id="desc">A diagram illustrating Hanlon's Razor: choosing the simpler explanation over malice.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#f4f2ec"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="20" flood-color="#17212b" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect width="1400" height="933" fill="url(#bg)"/>
  <rect x="160" y="126" width="1080" height="680" rx="18" fill="#ffffff" filter="url(#shadow)"/>
  
  <text x="220" y="204" fill="#2e6678" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">HANLON'S RAZOR</text>

  <g transform="translate(350, 350)">
    <!-- The Event -->
    <rect x="250" y="0" width="200" height="80" rx="8" fill="#dfe4dc" stroke="#68747c" stroke-width="2"/>
    <text x="350" y="45" text-anchor="middle" fill="#2e6678" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">NEGATIVE EVENT</text>

    <!-- Path to Malice -->
    <path d="M 300 80 L 150 200" stroke="#c95b4d" stroke-width="3" stroke-dasharray="5,5" fill="none"/>
    <rect x="50" y="200" width="200" height="120" rx="12" fill="#f1f4ed" stroke="#c95b4d" stroke-width="2"/>
    <text x="150" y="240" text-anchor="middle" fill="#c95b4d" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">MALICE</text>
    <text x="150" y="270" text-anchor="middle" fill="#68747c" font-family="Inter, Arial, sans-serif" font-size="16">"They did it on purpose"</text>
    <text x="150" y="295" text-anchor="middle" fill="#c95b4d" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">STRESS &amp; ANGER</text>

    <!-- Path to Incompetence (The Razor) -->
    <path d="M 400 80 L 550 200" stroke="#1f7a8c" stroke-width="4" fill="none" marker-end="url(#arrow-teal)"/>
    <defs>
      <marker id="arrow-teal" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
        <path d="M0,0 L0,6 L9,3 z" fill="#1f7a8c" />
      </marker>
    </defs>
    
    <rect x="450" y="200" width="200" height="120" rx="12" fill="#1f7a8c" opacity="0.1"/>
    <rect x="450" y="200" width="200" height="120" rx="12" fill="none" stroke="#1f7a8c" stroke-width="3"/>
    <text x="550" y="240" text-anchor="middle" fill="#1f7a8c" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">NEGLECT</text>
    <text x="550" y="270" text-anchor="middle" fill="#68747c" font-family="Inter, Arial, sans-serif" font-size="16">"They made a mistake"</text>
    <text x="550" y="295" text-anchor="middle" fill="#1f7a8c" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">UNDERSTANDING</text>

    <!-- The Razor Label -->
    <text x="350" y="160" text-anchor="middle" fill="#c59838" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" font-style="italic">THE RAZOR CUTS HERE</text>
    <path d="M 280 145 L 420 145" stroke="#c59838" stroke-width="2"/>
  </g>

  <text x="700" y="790" text-anchor="middle" fill="#5d6870" font-family="Inter, Arial, sans-serif" font-size="32">Simpler explanations are usually the correct ones.</text>
</svg>
