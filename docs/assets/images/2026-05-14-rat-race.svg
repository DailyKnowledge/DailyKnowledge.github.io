<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 933" role="img" aria-labelledby="title desc">
  <title id="title">Rat race feedback loop</title>
  <desc id="desc">A circular loop showing income, spending, obligations, and more work reinforcing each other.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fbfaf6"/>
      <stop offset="1" stop-color="#e8f2ef"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="20" flood-color="#16211f" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="1400" height="933" fill="url(#bg)"/>
  <rect x="170" y="112" width="1060" height="700" rx="18" fill="#fff" filter="url(#shadow)"/>
  <circle cx="700" cy="462" r="230" fill="#f5f7f1" stroke="#dfe4dc" stroke-width="4"/>
  <path d="M700 232 C 840 232, 954 332, 974 464" fill="none" stroke="#1f7a8c" stroke-width="18" stroke-linecap="round"/>
  <path d="M968 464 L 1012 418 L 1022 500 Z" fill="#1f7a8c"/>
  <path d="M974 464 C 974 604, 850 694, 710 694" fill="none" stroke="#c75c4a" stroke-width="18" stroke-linecap="round"/>
  <path d="M710 694 L 766 728 L 684 748 Z" fill="#c75c4a"/>
  <path d="M700 694 C 560 694, 426 604, 426 464" fill="none" stroke="#c59838" stroke-width="18" stroke-linecap="round"/>
  <path d="M426 464 L 380 508 L 372 426 Z" fill="#c59838"/>
  <path d="M426 464 C 446 330, 560 232, 700 232" fill="none" stroke="#6b8f71" stroke-width="18" stroke-linecap="round"/>
  <path d="M700 232 L 642 200 L 724 178 Z" fill="#6b8f71"/>
  <rect x="560" y="180" width="280" height="90" rx="12" fill="#eef6f3" stroke="#1f7a8c" stroke-width="4"/>
  <text x="700" y="236" text-anchor="middle" fill="#16211f" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">income rises</text>
  <rect x="850" y="418" width="280" height="90" rx="12" fill="#f8eeee" stroke="#c75c4a" stroke-width="4"/>
  <text x="990" y="474" text-anchor="middle" fill="#16211f" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">spending rises</text>
  <rect x="560" y="650" width="280" height="90" rx="12" fill="#f6efe5" stroke="#c59838" stroke-width="4"/>
  <text x="700" y="706" text-anchor="middle" fill="#16211f" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">fixed costs grow</text>
  <rect x="270" y="418" width="280" height="90" rx="12" fill="#f1f5ee" stroke="#6b8f71" stroke-width="4"/>
  <text x="410" y="474" text-anchor="middle" fill="#16211f" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">more work needed</text>
  <circle cx="700" cy="462" r="78" fill="#16211f"/>
  <text x="700" y="452" text-anchor="middle" fill="#fff" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">rat</text>
  <text x="700" y="488" text-anchor="middle" fill="#fff" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">race</text>
  <text x="220" y="196" fill="#2f665b" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">RAT RACE</text>
  <text x="220" y="758" fill="#5c6b66" font-family="Inter, Arial, sans-serif" font-size="30">the loop breaks when gains are not all converted into obligations</text>
</svg>
