<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 933" role="img" aria-labelledby="title desc">
  <title id="title">Metcalfe's Law</title>
  <desc id="desc">A diagram demonstrating Metcalfe's Law with three networks of size 2, 5, and 10, showing how connections grow quadratically as nodes are added.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#f4f2ec"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="20" flood-color="#17212b" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect width="1400" height="933" fill="url(#bg)"/>
  <rect x="160" y="126" width="1080" height="680" rx="18" fill="#ffffff" filter="url(#shadow)"/>
  
  <text x="220" y="204" fill="#2e6678" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">METCALFE'S LAW</text>

  <!-- Left: N=2 -->
  <g>
    <text x="350" y="290" text-anchor="middle" fill="#2e6678" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">N = 2</text>
    <text x="350" y="565" text-anchor="middle" fill="#1f7a8c" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">1 Connection</text>
    <text x="350" y="595" text-anchor="middle" fill="#68747c" font-family="Inter, Arial, sans-serif" font-size="14">Value: Baseline</text>
    
    <!-- Connection -->
    <line x1="310" y1="420" x2="390" y2="420" stroke="#1f7a8c" stroke-width="3" opacity="0.8"/>
    
    <!-- Nodes -->
    <circle cx="310" cy="420" r="12" fill="#1f7a8c" stroke="#ffffff" stroke-width="2.5"/>
    <circle cx="390" cy="420" r="12" fill="#1f7a8c" stroke="#ffffff" stroke-width="2.5"/>
  </g>

  <!-- Middle: N=5 -->
  <g>
    <text x="680" y="290" text-anchor="middle" fill="#2e6678" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">N = 5</text>
    <text x="680" y="565" text-anchor="middle" fill="#1f7a8c" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">10 Connections</text>
    <text x="680" y="595" text-anchor="middle" fill="#68747c" font-family="Inter, Arial, sans-serif" font-size="14">Value: 10x growth</text>
    
    <!-- Connections (10) -->
    <g stroke="#1f7a8c" stroke-width="2" opacity="0.6">
      <line x1="740" y1="420" x2="698" y2="477"/>
      <line x1="740" y1="420" x2="631" y2="455"/>
      <line x1="740" y1="420" x2="631" y2="385"/>
      <line x1="740" y1="420" x2="698" y2="363"/>
      
      <line x1="698" y1="477" x2="631" y2="455"/>
      <line x1="698" y1="477" x2="631" y2="385"/>
      <line x1="698" y1="477" x2="698" y2="363"/>
      
      <line x1="631" y1="455" x2="631" y2="385"/>
      <line x1="631" y1="455" x2="698" y2="363"/>
      
      <line x1="631" y1="385" x2="698" y2="363"/>
    </g>

    <!-- Nodes -->
    <circle cx="740" cy="420" r="10" fill="#1f7a8c" stroke="#ffffff" stroke-width="2"/>
    <circle cx="698" cy="477" r="10" fill="#1f7a8c" stroke="#ffffff" stroke-width="2"/>
    <circle cx="631" cy="455" r="10" fill="#1f7a8c" stroke="#ffffff" stroke-width="2"/>
    <circle cx="631" cy="385" r="10" fill="#1f7a8c" stroke="#ffffff" stroke-width="2"/>
    <circle cx="698" cy="363" r="10" fill="#1f7a8c" stroke="#ffffff" stroke-width="2"/>
  </g>

  <!-- Right: N=10 -->
  <g>
    <text x="1010" y="290" text-anchor="middle" fill="#2e6678" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">N = 10</text>
    <text x="1010" y="565" text-anchor="middle" fill="#1f7a8c" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">45 Connections</text>
    <text x="1010" y="595" text-anchor="middle" fill="#68747c" font-family="Inter, Arial, sans-serif" font-size="14">Value: 45x growth (Explosive)</text>
    
    <!-- Connections (45) -->
    <g stroke="#1f7a8c" stroke-width="1.2" opacity="0.4">
      <!-- 0 connects to 1-9 -->
      <line x1="1100" y1="420" x2="1082" y2="473"/><line x1="1100" y1="420" x2="1038" y2="506"/><line x1="1100" y1="420" x2="982" y2="506"/><line x1="1100" y1="420" x2="938" y2="473"/><line x1="1100" y1="420" x2="920" y2="420"/><line x1="1100" y1="420" x2="938" y2="367"/><line x1="1100" y1="420" x2="982" y2="334"/><line x1="1100" y1="420" x2="1038" y2="334"/><line x1="1100" y1="420" x2="1082" y2="367"/>
      <!-- 1 connects to 2-9 -->
      <line x1="1082" y1="473" x2="1038" y2="506"/><line x1="1082" y1="473" x2="982" y2="506"/><line x1="1082" y1="473" x2="938" y2="473"/><line x1="1082" y1="473" x2="920" y2="420"/><line x1="1082" y1="473" x2="938" y2="367"/><line x1="1082" y1="473" x2="982" y2="334"/><line x1="1082" y1="473" x2="1038" y2="334"/><line x1="1082" y1="473" x2="1082" y2="367"/>
      <!-- 2 connects to 3-9 -->
      <line x1="1038" y1="506" x2="982" y2="506"/><line x1="1038" y1="506" x2="938" y2="473"/><line x1="1038" y1="506" x2="920" y2="420"/><line x1="1038" y1="506" x2="938" y2="367"/><line x1="1038" y1="506" x2="982" y2="334"/><line x1="1038" y1="506" x2="1038" y2="334"/><line x1="1038" y1="506" x2="1082" y2="367"/>
      <!-- 3 connects to 4-9 -->
      <line x1="982" y1="506" x2="938" y2="473"/><line x1="982" y1="506" x2="920" y2="420"/><line x1="982" y1="506" x2="938" y2="367"/><line x1="982" y1="506" x2="982" y2="334"/><line x1="982" y1="506" x2="1038" y2="334"/><line x1="982" y1="506" x2="1082" y2="367"/>
      <!-- 4 connects to 5-9 -->
      <line x1="938" y1="473" x2="920" y2="420"/><line x1="938" y1="473" x2="938" y2="367"/><line x1="938" y1="473" x2="982" y2="334"/><line x1="938" y1="473" x2="1038" y2="334"/><line x1="938" y1="473" x2="1082" y2="367"/>
      <!-- 5 connects to 6-9 -->
      <line x1="920" y1="420" x2="938" y2="367"/><line x1="920" y1="420" x2="982" y2="334"/><line x1="920" y1="420" x2="1038" y2="334"/><line x1="920" y1="420" x2="1082" y2="367"/>
      <!-- 6 connects to 7-9 -->
      <line x1="938" y1="367" x2="982" y2="334"/><line x1="938" y1="367" x2="1038" y2="334"/><line x1="938" y1="367" x2="1082" y2="367"/>
      <!-- 7 connects to 8-9 -->
      <line x1="982" y1="334" x2="1038" y2="334"/><line x1="982" y1="334" x2="1082" y2="367"/>
      <!-- 8 connects to 9 -->
      <line x1="1038" y1="334" x2="1082" y2="367"/>
    </g>

    <!-- Nodes -->
    <circle cx="1100" cy="420" r="8" fill="#1f7a8c" stroke="#ffffff" stroke-width="1.5"/>
    <circle cx="1082" cy="473" r="8" fill="#1f7a8c" stroke="#ffffff" stroke-width="1.5"/>
    <circle cx="1038" cy="506" r="8" fill="#1f7a8c" stroke="#ffffff" stroke-width="1.5"/>
    <circle cx="982" cy="506" r="8" fill="#1f7a8c" stroke="#ffffff" stroke-width="1.5"/>
    <circle cx="938" cy="473" r="8" fill="#1f7a8c" stroke="#ffffff" stroke-width="1.5"/>
    <circle cx="920" cy="420" r="8" fill="#1f7a8c" stroke="#ffffff" stroke-width="1.5"/>
    <circle cx="938" cy="367" r="8" fill="#1f7a8c" stroke="#ffffff" stroke-width="1.5"/>
    <circle cx="982" cy="334" r="8" fill="#1f7a8c" stroke="#ffffff" stroke-width="1.5"/>
    <circle cx="1038" cy="334" r="8" fill="#1f7a8c" stroke="#ffffff" stroke-width="1.5"/>
    <circle cx="1082" cy="367" r="8" fill="#1f7a8c" stroke="#ffffff" stroke-width="1.5"/>
  </g>

  <!-- Formula Callout -->
  <g transform="translate(565, 150)">
    <rect x="0" y="0" width="270" height="42" rx="6" fill="#f1f8e9" stroke="#388e3c" stroke-width="2"/>
    <text x="135" y="26" text-anchor="middle" fill="#388e3c" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="900">Value of Network ≈ N²</text>
  </g>

  <!-- Bottom Message -->
  <text x="700" y="790" text-anchor="middle" fill="#5d6870" font-family="Inter, Arial, sans-serif" font-size="32">"The value of a network scales with the square of its users."</text>
</svg>
