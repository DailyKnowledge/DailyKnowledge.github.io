<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 933" role="img" aria-labelledby="title desc">
  <title id="title">The Dichotomy of Control</title>
  <desc id="desc">A diagram showing the Stoic dichotomy of control: what is within our power and what is not.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#f4f2ec"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="20" flood-color="#17212b" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect width="1400" height="933" fill="url(#bg)"/>
  <rect x="160" y="126" width="1080" height="680" rx="18" fill="#ffffff" filter="url(#shadow)"/>
  
  <text x="200" y="204" fill="#2e6678" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">
  <tspan dy="1.2em">THE DICHOTOMY OF </tspan>
  <tspan x="270" dy="1.2em">CONTROL</tspan>


</text>


  <!-- Outer Circle: Outside Control -->
  <circle cx="700" cy="460" r="280" fill="#f1f4ed" stroke="#dfe4dc" stroke-width="2"/>
  <text x="700" y="230" text-anchor="middle" fill="#5c6b66" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">OUTSIDE MY CONTROL</text>
  
  <text x="500" y="420" text-anchor="middle" fill="#9aa5a1" font-family="Inter, Arial, sans-serif" font-size="18">Reputation</text>
  <text x="900" y="420" text-anchor="middle" fill="#9aa5a1" font-family="Inter, Arial, sans-serif" font-size="18">Outcomes</text>
  <text x="700" y="680" text-anchor="middle" fill="#9aa5a1" font-family="Inter, Arial, sans-serif" font-size="18">Others' Actions</text>
  <text x="520" y="550" text-anchor="middle" fill="#9aa5a1" font-family="Inter, Arial, sans-serif" font-size="18">Past Events</text>
  <text x="880" y="550" text-anchor="middle" fill="#9aa5a1" font-family="Inter, Arial, sans-serif" font-size="18">Traffic / Weather</text>

  <!-- Inner Circle: Inside Control -->
  <circle cx="700" cy="460" r="140" fill="#1f7a8c" opacity="0.9"/>
  <text x="700" y="445" text-anchor="middle" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">WITHIN MY</text>
  <text x="700" y="475" text-anchor="middle" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">CONTROL</text>
  
  <text x="700" y="520" text-anchor="middle" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="14" opacity="0.8">Actions · Judgments · Values</text>

  <text x="700" y="790" text-anchor="middle" fill="#5d6870" font-family="Inter, Arial, sans-serif" font-size="32">Happiness is found in knowing where your power ends.</text>
</svg>
