<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 933" role="img" aria-labelledby="title desc">
  <title id="title">The IKEA Effect</title>
  <desc id="desc">A diagram illustrating the IKEA Effect: placing higher value on things we helped build.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#f4f2ec"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="20" flood-color="#17212b" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect width="1400" height="933" fill="url(#bg)"/>
  <rect x="160" y="126" width="1080" height="680" rx="18" fill="#ffffff" filter="url(#shadow)"/>
  
  <text x="220" y="204" fill="#2e6678" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">THE IKEA EFFECT</text>

  <g transform="translate(350, 320)">
    <!-- Case 1: Pre-assembled -->
    <g transform="translate(0, 0)">
      <rect x="20" y="100" width="200" height="120" rx="8" fill="#dfe4dc" stroke="#68747c" stroke-width="2"/>
      <line x1="20" y1="140" x2="220" y2="140" stroke="#68747c" stroke-width="2"/>
      <text x="120" y="250" text-anchor="middle" fill="#68747c" font-family="Inter, Arial, sans-serif" font-size="20">Pre-Assembled</text>
      
      <!-- Value Bar -->
      <rect x="90" y="0" width="60" height="80" fill="#1f7a8c"/>
      <text x="120" y="-15" text-anchor="middle" fill="#1f7a8c" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Market Value</text>
    </g>

    <!-- Plus Effort -->
    <text x="320" y="160" text-anchor="middle" fill="#c59838" font-family="Inter, Arial, sans-serif" font-size="60" font-weight="700">+</text>
    <text x="320" y="210" text-anchor="middle" fill="#c59838" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">MY LABOR</text>

    <!-- Case 2: Self-assembled -->
    <g transform="translate(450, 0)">
      <rect x="20" y="100" width="200" height="120" rx="8" fill="#dfe4dc" stroke="#68747c" stroke-width="2"/>
      <line x1="20" y1="140" x2="220" y2="140" stroke="#68747c" stroke-width="2"/>
      <!-- Allen Wrench Icon -->
      <path d="M 60 160 L 100 160 L 100 200" fill="none" stroke="#c59838" stroke-width="4" stroke-linecap="round"/>
      <text x="120" y="250" text-anchor="middle" fill="#68747c" font-family="Inter, Arial, sans-serif" font-size="20">Self-Assembled</text>
      
      <!-- Inflated Value Bar -->
      <rect x="70" y="-80" width="100" height="160" fill="#1f7a8c"/>
      <rect x="70" y="-80" width="100" height="80" fill="#c59838" opacity="0.6"/>
      <text x="120" y="-95" text-anchor="middle" fill="#1f7a8c" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">PERCEIVED VALUE</text>
      <text x="120" y="-40" text-anchor="middle" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">Effort Bias</text>
    </g>
  </g>

  <text x="700" y="790" text-anchor="middle" fill="#5d6870" font-family="Inter, Arial, sans-serif" font-size="32">Labor leads to love, but not necessarily quality.</text>
</svg>
