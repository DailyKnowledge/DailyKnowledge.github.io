<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 933" role="img" aria-labelledby="title desc">
  <title id="title">Sunk Cost Fallacy</title>
  <desc id="desc">A diagram illustrating the Sunk Cost Fallacy: holding on to past investments vs. choosing the future path.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#f4f2ec"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="20" flood-color="#17212b" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect width="1400" height="933" fill="url(#bg)"/>
  <rect x="160" y="126" width="1080" height="680" rx="18" fill="#ffffff" filter="url(#shadow)"/>
  
  <text x="220" y="204" fill="#2e6678" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">SUNK COST FALLACY</text>

  <g transform="translate(450, 350)">
    <!-- Past Investment (The Sinkhole) -->
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="200" height="150" rx="12" fill="#f1f4ed" stroke="#c95b4d" stroke-width="3"/>
      <text x="100" y="80" text-anchor="middle" fill="#c95b4d" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">PAST INVESTMENT</text>
      <text x="100" y="110" text-anchor="middle" fill="#68747c" font-family="Inter, Arial, sans-serif" font-size="16">(Already Spent)</text>
      <path d="M 100 150 L 100 200" stroke="#c95b4d" stroke-width="4" stroke-dasharray="6,4"/>
    </g>

    <!-- The Razor / Decision Point -->
    <path d="M 230 75 L 370 75" stroke="#c59838" stroke-width="4" stroke-linecap="round"/>
    <text x="300" y="50" text-anchor="middle" fill="#c59838" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" font-style="italic">CUT LOSSES</text>

    <!-- Future Path -->
    <g transform="translate(400, 0)">
      <rect x="0" y="0" width="200" height="150" rx="12" fill="#f1f4ed" stroke="#1f7a8c" stroke-width="3"/>
      <text x="100" y="80" text-anchor="middle" fill="#1f7a8c" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">FUTURE POTENTIAL</text>
      <text x="100" y="110" text-anchor="middle" fill="#68747c" font-family="Inter, Arial, sans-serif" font-size="16">(Future Benefit)</text>
      <path d="M 100 150 L 100 200" stroke="#1f7a8c" stroke-width="4" marker-end="url(#arrow-teal)"/>
    </g>
    
    <defs>
      <marker id="arrow-teal" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
        <path d="M0,0 L0,6 L9,3 z" fill="#1f7a8c" />
      </marker>
    </defs>
  </g>

  <text x="700" y="790" text-anchor="middle" fill="#5d6870" font-family="Inter, Arial, sans-serif" font-size="32">Past investment is gone; focus on future value.</text>
</svg>
