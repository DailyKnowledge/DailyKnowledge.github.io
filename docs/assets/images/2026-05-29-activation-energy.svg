<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 933" role="img" aria-labelledby="title desc">
  <title id="title">Activation Energy</title>
  <desc id="desc">A diagram showing a ball needing an initial push to cross an energy barrier before rolling downhill.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fbfcff"/>
      <stop offset="1" stop-color="#f4f6ee"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="20" flood-color="#18212b" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="15" markerHeight="15" refX="11" refY="7.5" orient="auto">
      <path d="M1 1 L13 7.5 L1 14 Z" fill="#2d6678"/>
    </marker>
    <marker id="spark" markerWidth="18" markerHeight="18" refX="9" refY="9" orient="auto">
      <path d="M9 1 L11 7 L17 9 L11 11 L9 17 L7 11 L1 9 L7 7 Z" fill="#d86845"/>
    </marker>
  </defs>
  <rect width="1400" height="933" fill="url(#bg)"/>
  <rect x="160" y="126" width="1080" height="680" rx="18" fill="#ffffff" filter="url(#shadow)"/>
  <text x="220" y="204" fill="#2d6678" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">ACTIVATION ENERGY</text>

  <line x1="260" y1="666" x2="1138" y2="666" stroke="#d1d9de" stroke-width="6" stroke-linecap="round"/>
  <line x1="260" y1="256" x2="260" y2="666" stroke="#d1d9de" stroke-width="6" stroke-linecap="round"/>
  <text x="214" y="466" text-anchor="middle" transform="rotate(-90 214 466)" fill="#68747c" font-family="Inter, Arial, sans-serif" font-size="25">energy</text>
  <text x="700" y="724" text-anchor="middle" fill="#68747c" font-family="Inter, Arial, sans-serif" font-size="25">progress of change</text>

  <path d="M308 592 C 420 590, 478 538, 536 424 C 591 316, 654 302, 716 404 C 790 528, 882 600, 1096 602" fill="none" stroke="#2d6678" stroke-width="16" stroke-linecap="round"/>
  <path d="M308 592 C 420 590, 478 538, 536 424 C 591 316, 654 302, 716 404" fill="none" stroke="#2d6678" stroke-width="40" stroke-linecap="round" opacity="0.14"/>

  <circle cx="382" cy="580" r="34" fill="#d86845" stroke="#b94f3d" stroke-width="5"/>
  <path d="M300 520 C 326 494, 354 486, 386 492" fill="none" stroke="#d86845" stroke-width="10" stroke-linecap="round" marker-end="url(#spark)"/>
  <text x="366" y="450" text-anchor="middle" fill="#b94f3d" font-family="Inter, Arial, sans-serif" font-size="27" font-weight="700">initial push</text>

  <line x1="628" y1="602" x2="628" y2="342" stroke="#c95b4d" stroke-width="8" stroke-linecap="round" stroke-dasharray="16 18"/>
  <path d="M628 342 L628 602" fill="none" stroke="#c95b4d" stroke-width="8" stroke-linecap="round" marker-end="url(#arrow)"/>
  <rect x="684" y="386" width="278" height="92" rx="16" fill="#fff3ef" stroke="#dfb4aa" stroke-width="4"/>
  <text x="823" y="424" text-anchor="middle" fill="#b94f3d" font-family="Inter, Arial, sans-serif" font-size="27" font-weight="700">barrier to start</text>
  <text x="823" y="460" text-anchor="middle" fill="#68747c" font-family="Inter, Arial, sans-serif" font-size="22">activation energy</text>

  <circle cx="1028" cy="602" r="22" fill="#2d6678"/>
  <rect x="878" y="628" width="274" height="86" rx="16" fill="#edf7f8" stroke="#aacbd2" stroke-width="4"/>
  <text x="1015" y="664" text-anchor="middle" fill="#2d6678" font-family="Inter, Arial, sans-serif" font-size="27" font-weight="700">easier after start</text>
  <text x="1015" y="698" text-anchor="middle" fill="#68747c" font-family="Inter, Arial, sans-serif" font-size="22">the path can release energy</text>

  <path d="M512 780 C 608 748, 788 748, 888 780" fill="none" stroke="#e0d5c8" stroke-width="14" stroke-linecap="round"/>
  <text x="700" y="820" text-anchor="middle" fill="#5d6870" font-family="Inter, Arial, sans-serif" font-size="32">a useful change can still need energy to begin</text>
</svg>
