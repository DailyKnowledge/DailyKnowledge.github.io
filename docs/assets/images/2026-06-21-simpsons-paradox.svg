<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 933" role="img" aria-labelledby="title desc">
  <title id="title">Simpson's Paradox</title>
  <desc id="desc">A scatter plot illustrating Simpson's Paradox: Group A and Group B both show positive trends, but the aggregated trend line shows a negative trend.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#f4f2ec"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="20" flood-color="#17212b" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect width="1400" height="933" fill="url(#bg)"/>
  <rect x="160" y="126" width="1080" height="680" rx="18" fill="#ffffff" filter="url(#shadow)"/>
  
  <text x="220" y="204" fill="#2e6678" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">SIMPSON'S PARADOX</text>

  <!-- Chart Area -->
  <g transform="translate(100, 30)">
    <!-- Grid Lines -->
    <line x1="300" y1="250" x2="1000" y2="250" stroke="#f0f0f0" stroke-width="2"/>
    <line x1="300" y1="350" x2="1000" y2="350" stroke="#f0f0f0" stroke-width="2"/>
    <line x1="300" y1="450" x2="1000" y2="450" stroke="#f0f0f0" stroke-width="2"/>
    <line x1="300" y1="550" x2="1000" y2="550" stroke="#f0f0f0" stroke-width="2"/>
    <line x1="300" y1="650" x2="1000" y2="650" stroke="#f0f0f0" stroke-width="2"/>
    
    <line x1="400" y1="200" x2="400" y2="650" stroke="#f0f0f0" stroke-width="2"/>
    <line x1="550" y1="200" x2="550" y2="650" stroke="#f0f0f0" stroke-width="2"/>
    <line x1="700" y1="200" x2="700" y2="650" stroke="#f0f0f0" stroke-width="2"/>
    <line x1="850" y1="200" x2="850" y2="650" stroke="#f0f0f0" stroke-width="2"/>

    <!-- Axes -->
    <path d="M 300 200 L 300 650 L 1050 650" fill="none" stroke="#68747c" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Axis Labels -->
    <text x="675" y="700" text-anchor="middle" fill="#68747c" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">Independent Variable (X)</text>
    
    <!-- Y-Axis Label (Rotated) -->
    <text x="-425" y="240" transform="rotate(-90)" text-anchor="middle" fill="#68747c" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">Outcome (Y)</text>

    <!-- Group A Trend (Teal) -->
    <line x1="380" y1="390" x2="580" y2="290" stroke="#1f7a8c" stroke-width="4" stroke-linecap="round"/>
    <text x="590" y="295" fill="#1f7a8c" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">Group A Trend (+)</text>

    <!-- Group A Points (Teal) -->
    <circle cx="400" cy="380" r="10" fill="#1f7a8c" stroke="#ffffff" stroke-width="2"/>
    <circle cx="430" cy="360" r="10" fill="#1f7a8c" stroke="#ffffff" stroke-width="2"/>
    <circle cx="470" cy="350" r="10" fill="#1f7a8c" stroke="#ffffff" stroke-width="2"/>
    <circle cx="510" cy="320" r="10" fill="#1f7a8c" stroke="#ffffff" stroke-width="2"/>
    <circle cx="550" cy="310" r="10" fill="#1f7a8c" stroke="#ffffff" stroke-width="2"/>

    <!-- Group B Trend (Orange) -->
    <line x1="730" y1="590" x2="930" y2="490" stroke="#c59838" stroke-width="4" stroke-linecap="round"/>
    <text x="940" y="495" fill="#c59838" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">Group B Trend (+)</text>

    <!-- Group B Points (Orange) -->
    <circle cx="750" cy="580" r="10" fill="#c59838" stroke="#ffffff" stroke-width="2"/>
    <circle cx="780" cy="560" r="10" fill="#c59838" stroke="#ffffff" stroke-width="2"/>
    <circle cx="820" cy="550" r="10" fill="#c59838" stroke="#ffffff" stroke-width="2"/>
    <circle cx="860" cy="520" r="10" fill="#c59838" stroke="#ffffff" stroke-width="2"/>
    <circle cx="900" cy="510" r="10" fill="#c59838" stroke="#ffffff" stroke-width="2"/>

    <!-- Combined Aggregate Trend (Red, Negative) -->
    <line x1="430" y1="330" x2="860" y2="570" stroke="#c95b4d" stroke-width="4" stroke-dasharray="10,6" stroke-linecap="round"/>
    
    <!-- Aggregate Label Box -->
    <rect x="520" y="445" width="280" height="40" rx="6" fill="#ffffff" stroke="#c95b4d" stroke-width="2"/>
    <text x="660" y="471" text-anchor="middle" fill="#c95b4d" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">Aggregated Trend (-)</text>
  </g>

  <!-- Bottom Message -->
  <text x="700" y="790" text-anchor="middle" fill="#5d6870" font-family="Inter, Arial, sans-serif" font-size="32">Subgroups show positive trends, while the aggregate reverses.</text>
</svg>
