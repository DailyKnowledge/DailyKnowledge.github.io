<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 933" role="img" aria-labelledby="title desc">
  <title id="title">The Iceberg Model</title>
  <desc id="desc">A diagram showing the levels of the iceberg model: Events, Patterns, Structures, and Mental Models.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#f4f2ec"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="20" flood-color="#17212b" flood-opacity="0.14"/>
    </filter>
    <linearGradient id="water" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#eef7f8"/>
      <stop offset="1" stop-color="#d0e4e8"/>
    </linearGradient>
  </defs>
  <rect width="1400" height="933" fill="url(#bg)"/>
  <rect x="160" y="126" width="1080" height="680" rx="18" fill="#ffffff" filter="url(#shadow)"/>
  
  <text x="220" y="204" fill="#2e6678" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">THE ICEBERG MODEL</text>

  <!-- Water line -->
  <line x1="250" y1="400" x2="1150" y2="400" stroke="#aacbd2" stroke-width="4" stroke-dasharray="10,10"/>
  <text x="1080" y="385" fill="#2e6678" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="600">WATER LINE</text>

  <!-- Iceberg -->
  <path d="M 700 280 L 800 400 L 950 700 L 450 700 L 600 400 Z" fill="#f7fafb" stroke="#aacbd2" stroke-width="4" stroke-linejoin="round"/>
  
  <!-- Levels -->
  <!-- Level 1: Events -->
  <circle cx="600" cy="330" r="8" fill="#c95b4d"/>
  <text x="620" y="338" fill="#c95b4d" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">EVENTS</text>
  <text x="620" y="365" fill="#68747c" font-family="Inter, Arial, sans-serif" font-size="18">What just happened?</text>

  <!-- Level 2: Patterns -->
  <circle cx="500" cy="460" r="8" fill="#2e6678"/>
  <text x="520" y="468" fill="#2e6678" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">PATTERNS</text>
  <text x="520" y="495" fill="#68747c" font-family="Inter, Arial, sans-serif" font-size="18">What has been happening?</text>

  <!-- Level 3: Structures -->
  <circle cx="480" cy="560" r="8" fill="#2e6678"/>
  <text x="500" y="568" fill="#2e6678" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">STRUCTURES</text>
  <text x="500" y="595" fill="#68747c" font-family="Inter, Arial, sans-serif" font-size="18">What is causing the patterns?</text>

  <!-- Level 4: Mental Models -->
  <circle cx="460" cy="660" r="8" fill="#2e6678"/>
  <text x="480" y="668" fill="#2e6678" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">MENTAL MODELS</text>
  <text x="480" y="695" fill="#68747c" font-family="Inter, Arial, sans-serif" font-size="18">How do we think about the system?</text>

  <text x="700" y="790" text-anchor="middle" fill="#5d6870" font-family="Inter, Arial, sans-serif" font-size="32">True change happens below the surface.</text>
</svg>
