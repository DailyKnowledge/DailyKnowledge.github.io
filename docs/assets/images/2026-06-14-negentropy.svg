<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 933" role="img" aria-labelledby="title desc">
  <title id="title">Negentropy</title>
  <desc id="desc">A diagram illustrating Negentropy.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#f4f2ec"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="20" flood-color="#17212b" flood-opacity="0.14"/>
    </filter>
    
    
    
    
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#6b8f71" />
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#c59838" />
    </marker>
  
  
  </defs>
  <rect width="1400" height="933" fill="url(#bg)"/>
  <rect x="160" y="126" width="1080" height="680" rx="18" fill="#ffffff" filter="url(#shadow)"/>
  
  <text x="220" y="204" fill="#2e6678" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">NEGENTROPY</text>

  <g transform="translate(160.0, 196.0) scale(1.35)">
    <g transform="translate(400, 210)">
    <!-- System Boundary centered -->
    <rect x="-80" y="-80" width="160" height="160" fill="none" stroke="#2e6678" stroke-width="2" stroke-dasharray="6,3"/>
    <text x="0" y="-95" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#2e6678">Ordered System</text>

    <g fill="#1f7a8c">
      <circle cx="-60" cy="-60" r="6"/> <circle cx="-30" cy="-60" r="6"/> <circle cx="0" cy="-60" r="6"/> <circle cx="30" cy="-60" r="6"/> <circle cx="60" cy="-60" r="6"/>
      <circle cx="-60" cy="-30" r="6"/> <circle cx="-30" cy="-30" r="6"/> <circle cx="0" cy="-30" r="6"/> <circle cx="30" cy="-30" r="6"/> <circle cx="60" cy="-30" r="6"/>
      <circle cx="-60" cy="0" r="6"/> <circle cx="-30" cy="0" r="6"/> <circle cx="0" cy="0" r="6"/> <circle cx="30" cy="0" r="6"/> <circle cx="60" cy="0" r="6"/>
      <circle cx="-60" cy="30" r="6"/> <circle cx="-30" cy="30" r="6"/> <circle cx="0" cy="30" r="6"/> <circle cx="30" cy="30" r="6"/> <circle cx="60" cy="30" r="6"/>
      <circle cx="-60" cy="60" r="6"/> <circle cx="-30" cy="60" r="6"/> <circle cx="0" cy="60" r="6"/> <circle cx="30" cy="60" r="6"/> <circle cx="60" cy="60" r="6"/>
    </g>

    <g fill="#d1d9de">
      <circle cx="-250" cy="-80" r="4"/> <circle cx="-180" cy="-120" r="4"/> <circle cx="-300" cy="50" r="4"/>
      <circle cx="250" cy="-50" r="4"/> <circle cx="180" cy="80" r="4"/> <circle cx="320" cy="-100" r="4"/>
    </g>
    <text x="-240" y="110" font-family="Inter, Arial, sans-serif" font-size="16" fill="#68747c">Environment (Chaos)</text>

    <path d="-M 280 0 L -100 0" fill="none" stroke="#6b8f71" stroke-width="3" marker-end="url(#arrow-green)"/>
    <text x="-190" y="-10" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#6b8f71">Energy In</text>

    <path d="M 100 0 L 280 0" fill="none" stroke="#c59838" stroke-width="3" marker-end="url(#arrow-orange)"/>
    <text x="190" y="-10" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#c59838">Disorder Out</text>
  </g>
  </g>

  <text x="700" y="790" text-anchor="middle" fill="#5d6870" font-family="Inter, Arial, sans-serif" font-size="32">Life maintains order by exporting disorder to its environment.</text>
</svg>