<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 933" role="img" aria-labelledby="title desc">
  <title id="title">Homeostasis feedback system</title>
  <desc id="desc">A balanced biological feedback diagram showing regulation around a stable range.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fbf7"/>
      <stop offset="1" stop-color="#e7f3f5"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="20" flood-color="#16211f" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="1400" height="933" fill="url(#bg)"/>
  <rect x="174" y="126" width="1052" height="680" rx="18" fill="#fff" filter="url(#shadow)"/>
  <circle cx="700" cy="466" r="158" fill="#eef6f3" stroke="#1f7a8c" stroke-width="10"/>
  <circle cx="700" cy="466" r="76" fill="#1f7a8c"/>
  <text x="700" y="456" text-anchor="middle" fill="#fff" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700">stable</text>
  <text x="700" y="496" text-anchor="middle" fill="#fff" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700">range</text>
  <path d="M470 344 C 388 396, 366 510, 426 596" fill="none" stroke="#c75c4a" stroke-width="16" stroke-linecap="round"/>
  <path d="M930 588 C 1012 536, 1034 422, 974 336" fill="none" stroke="#c75c4a" stroke-width="16" stroke-linecap="round"/>
  <path d="M430 602 L 402 544 L 466 548 Z" fill="#c75c4a"/>
  <path d="M970 330 L 998 388 L 934 384 Z" fill="#c75c4a"/>
  <rect x="250" y="302" width="250" height="92" rx="12" fill="#f6efe5" stroke="#c59838" stroke-width="4"/>
  <text x="375" y="358" text-anchor="middle" fill="#16211f" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">sensor</text>
  <rect x="900" y="538" width="250" height="92" rx="12" fill="#f6efe5" stroke="#c59838" stroke-width="4"/>
  <text x="1025" y="594" text-anchor="middle" fill="#16211f" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">response</text>
  <line x1="500" y1="348" x2="548" y2="384" stroke="#5c6b66" stroke-width="5" stroke-linecap="round"/>
  <line x1="852" y1="546" x2="900" y2="584" stroke="#5c6b66" stroke-width="5" stroke-linecap="round"/>
  <text x="222" y="208" fill="#2f665b" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">HOMEOSTASIS</text>
  <text x="222" y="736" fill="#5c6b66" font-family="Inter, Arial, sans-serif" font-size="30">feedback keeps conditions within usable limits</text>
</svg>
