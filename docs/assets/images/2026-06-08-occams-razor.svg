<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 933" role="img" aria-labelledby="title desc">
  <title id="title">Occam's Razor</title>
  <desc id="desc">A diagram illustrating Occam's Razor: shaving away unnecessary assumptions to find the simplest explanation.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#f4f2ec"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="20" flood-color="#17212b" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect width="1400" height="933" fill="url(#bg)"/>
  <rect x="160" y="126" width="1080" height="680" rx="18" fill="#ffffff" filter="url(#shadow)"/>
  
  <text x="220" y="204" fill="#2e6678" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">OCCAM'S RAZOR</text>

  <!-- Complex Explanation (Too many assumptions) -->
  <g opacity="0.4">
    <rect x="250" y="320" width="400" height="240" rx="12" fill="#fff3ef" stroke="#dfb6ad" stroke-width="2" stroke-dasharray="8,8"/>
    <text x="450" y="360" text-anchor="middle" fill="#b94f43" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">COMPLEX THEORY</text>
    <circle cx="350" cy="420" r="15" fill="#d96554"/>
    <circle cx="450" cy="420" r="15" fill="#d96554"/>
    <circle cx="550" cy="420" r="15" fill="#d96554"/>
    <circle cx="400" cy="480" r="15" fill="#d96554"/>
    <circle cx="500" cy="480" r="15" fill="#d96554"/>
    <text x="450" y="530" text-anchor="middle" fill="#68747c" font-family="Inter, Arial, sans-serif" font-size="18">Too many assumptions</text>
  </g>

  <!-- The "Razor" -->
  <path d="M 680 280 L 720 280 L 720 620 L 680 620 Z" fill="#c59838" opacity="0.8"/>
  <path d="M 700 250 L 700 650" stroke="#c59838" stroke-width="4" stroke-linecap="round"/>
  <text x="700" y="680" text-anchor="middle" fill="#c59838" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">THE RAZOR</text>

  <!-- Simple Explanation (Minimal assumptions) -->
  <g>
    <rect x="750" y="320" width="400" height="240" rx="12" fill="#eef7f8" stroke="#1f7a8c" stroke-width="4"/>
    <text x="950" y="360" text-anchor="middle" fill="#1f7a8c" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">SIMPLEST EXPLANATION</text>
    <circle cx="950" cy="440" r="25" fill="#1f7a8c"/>
    <text x="950" y="530" text-anchor="middle" fill="#68747c" font-family="Inter, Arial, sans-serif" font-size="18">Fewest assumptions</text>
  </g>

  <!-- Comparison Text -->
  <text x="450" y="620" text-anchor="middle" fill="#b94f43" font-family="Inter, Arial, sans-serif" font-size="20">Less likely to be true</text>
  <text x="950" y="620" text-anchor="middle" fill="#1f7a8c" font-family="Inter, Arial, sans-serif" font-size="20">More likely to be true</text>

  <text x="700" y="790" text-anchor="middle" fill="#5d6870" font-family="Inter, Arial, sans-serif" font-size="32">Plurality should not be posited without necessity.</text>
</svg>
