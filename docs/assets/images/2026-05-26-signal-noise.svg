<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 933" role="img" aria-labelledby="title desc">
  <title id="title">Signal and Noise</title>
  <desc id="desc">A diagram showing a smooth signal line emerging from noisy measurements.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f7fafc"/>
      <stop offset="1" stop-color="#f4f7ee"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="20" flood-color="#18212b" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect width="1400" height="933" fill="url(#bg)"/>
  <rect x="160" y="126" width="1080" height="680" rx="18" fill="#ffffff" filter="url(#shadow)"/>
  <text x="220" y="204" fill="#2b6678" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">SIGNAL AND NOISE</text>

  <line x1="260" y1="650" x2="1140" y2="650" stroke="#c9d3d8" stroke-width="6" stroke-linecap="round"/>
  <line x1="260" y1="288" x2="260" y2="650" stroke="#c9d3d8" stroke-width="6" stroke-linecap="round"/>
  <text x="700" y="718" text-anchor="middle" fill="#66727a" font-family="Inter, Arial, sans-serif" font-size="27">measurements over time</text>

  <polyline points="286,585 330,528 374,574 418,492 462,542 506,444 550,498 594,418 638,472 682,388 726,434 770,374 814,414 858,356 902,398 946,338 990,384 1034,320 1078,360 1122,306" fill="none" stroke="#d26455" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>
  <path d="M286 566 C 420 528, 514 489, 620 452 C 742 410, 858 382, 1122 330" fill="none" stroke="#2b6678" stroke-width="14" stroke-linecap="round"/>

  <circle cx="330" cy="528" r="12" fill="#d26455"/>
  <circle cx="418" cy="492" r="12" fill="#d26455"/>
  <circle cx="506" cy="444" r="12" fill="#d26455"/>
  <circle cx="594" cy="418" r="12" fill="#d26455"/>
  <circle cx="682" cy="388" r="12" fill="#d26455"/>
  <circle cx="770" cy="374" r="12" fill="#d26455"/>
  <circle cx="858" cy="356" r="12" fill="#d26455"/>
  <circle cx="946" cy="338" r="12" fill="#d26455"/>
  <circle cx="1034" cy="320" r="12" fill="#d26455"/>
  <circle cx="1122" cy="306" r="12" fill="#d26455"/>

  <rect x="306" y="300" width="260" height="96" rx="16" fill="#fff3ef" stroke="#e0b4ab" stroke-width="4"/>
  <text x="436" y="340" text-anchor="middle" fill="#b9473c" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">noise</text>
  <text x="436" y="376" text-anchor="middle" fill="#68747c" font-family="Inter, Arial, sans-serif" font-size="23">jagged variation</text>

  <rect x="834" y="478" width="260" height="96" rx="16" fill="#eef7f7" stroke="#a8cbd2" stroke-width="4"/>
  <text x="964" y="518" text-anchor="middle" fill="#2b6678" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">signal</text>
  <text x="964" y="554" text-anchor="middle" fill="#68747c" font-family="Inter, Arial, sans-serif" font-size="23">persistent pattern</text>

  <text x="700" y="786" text-anchor="middle" fill="#59666d" font-family="Inter, Arial, sans-serif" font-size="32">a real pattern can be hidden inside ordinary fluctuation</text>
</svg>
